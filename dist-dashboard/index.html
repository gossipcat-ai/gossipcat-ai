<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gossipcat Dashboard</title>
  <style>
/* Design tokens from spec */
:root {
  --bg-primary: #09090f;
  --bg-card: #13122b;
  --bg-nav: #12122a;
  --border: #2d2b55;
  --text-primary: #f8fafc;
  --text-secondary: #7c7c9e;
  --text-muted: #757d8a; /* Brightened for AA compliance (4.58:1) */
  --accent-primary: #a78bfa;
  --accent-secondary: #818cf8;
  --status-confirmed: #4ade80;
  --status-disputed: #ef4444;
  --status-unverified: #fbbf24;
  --status-unique: #6b7280;
  --status-new: #60a5fa;
  --radius-card: 10px;
  --radius-button: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
[hidden] { display: none !important; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}

/* Auth Gate */
.auth-gate {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 1.5rem; /* Normalized padding */
  text-align: center;
  max-width: 380px;
  width: 100%;
}

.auth-card h1 {
  color: var(--accent-primary);
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.auth-subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.875rem; }

.auth-card input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-button);
  color: var(--text-primary);
  font-size: 0.875rem;
  margin-bottom: 1rem;
  outline: none;
}
.auth-card input:focus { border-color: var(--accent-primary); }

.auth-card button {
  width: 100%;
  padding: 0.75rem;
  background: var(--accent-primary);
  color: #09090f;
  border: none;
  border-radius: var(--radius-button);
  font-weight: 600;
  font-size: 0.875rem;
  cursor: pointer;
}
.auth-card button:hover { opacity: 0.9; }

.auth-error { color: var(--status-disputed); font-size: 0.8rem; margin-top: 0.75rem; }

/* Nav */
.nav {
  display: flex;
  align-items: center;
  background: var(--bg-nav);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 52px;
}

.nav-brand {
  color: var(--accent-primary);
  font-weight: 600;
  font-size: 1rem;
  margin-right: 2rem;
}

.nav-tabs { display: flex; gap: 0.25rem; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }

.nav-tab {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0.5rem 1rem;
  font-size: 0.8125rem;
  cursor: pointer;
  border-radius: var(--radius-button);
  white-space: nowrap;
}
.nav-tab:hover:not(:disabled) { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.nav-tab:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: -2px; }
.nav-tab.active { color: var(--accent-primary); background: rgba(167, 139, 250, 0.1); box-shadow: inset 0 -2px 0 var(--accent-primary); }
.nav-tab:disabled { opacity: 0.35; cursor: default; }

.nav-status {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: var(--text-muted);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.online { background: var(--status-confirmed); }
.status-dot.offline { background: var(--status-disputed); }

/* Main */
.main { padding: 2rem 2.5rem; margin: 0 auto; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Cards */
.stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.25rem; margin-bottom: 2rem; }

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 1.5rem 1.75rem;
}
.stat-card .label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-card .value { font-size: 2.25rem; font-weight: 700; margin-top: 0.375rem; line-height: 1; }
.stat-card .detail { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; }

/* Panels - Vertical stack */
.panels { display: flex; flex-direction: column; gap: 1.5rem; }
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 1.5rem;
}
.panel-title {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 1.25rem;
  color: var(--text-muted);
}

/* Badges - Increased font size */
.agent-badge {
  font-size: 0.75rem; /* Increased from 0.625rem */
  padding: 0.125rem 0.5rem;
  border-radius: 3px;
  background: rgba(167, 139, 250, 0.15);
  color: var(--accent-primary);
  margin-left: 0.375rem;
}
.agent-badge.relay { background: rgba(96,165,250,0.15); color: var(--status-new); }
.agent-badge.skill { background: rgba(255,255,255,0.06); color: var(--text-secondary); margin-left: 0; }

.weight-badge {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--accent-primary);
}
.weight-badge.lg { font-size: 1.5rem; }

/* Agent Score Cards (Overview) */
.agent-score-card {
  padding: 1rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.agent-score-card:last-child { border-bottom: none; }
.agent-score-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.375rem;
}
.agent-score-name { font-size: 0.875rem; font-weight: 500; }
.agent-score-metrics {
  display: flex;
  gap: 1rem;
}
.metric {
  display: flex;
  align-items: center;
  gap: 0.375rem;
  flex: 1;
}
.metric-bar {
  flex: 1;
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.bar-fill.accuracy { background: var(--accent-primary); }
.bar-fill.uniqueness { background: var(--accent-secondary); }
.bar-fill.reliability { background: var(--status-confirmed); }
.metric-val { font-size: 0.6875rem; font-weight: 600; color: var(--text-primary); min-width: 28px; }
.metric-lbl { font-size: 0.75rem; color: var(--text-muted); } /* Increased font size */
.agent-score-stats {
  display: flex;
  gap: 0.75rem;
  font-size: 0.6875rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}
.agent-score-stats .halluc { color: var(--status-disputed); font-weight: 600; }

/* Agent Detail Cards (Agents tab) */
.agent-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem; }
.agent-detail-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 1.25rem;
}
.agent-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1rem;
}
.agent-title { display: flex; align-items: center; gap: 0.25rem; }
.agent-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
.agent-metrics-grid {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.agent-metric-card { text-align: center; }
.agent-metric-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.875rem; font-weight: 700;
  margin: 0 auto 0.25rem;
}
.agent-metric-ring.accuracy {
  background: conic-gradient(var(--accent-primary) calc(var(--pct) * 1%), rgba(255,255,255,0.08) 0);
}
.agent-metric-ring.uniqueness {
  background: conic-gradient(var(--accent-secondary) calc(var(--pct) * 1%), rgba(255,255,255,0.08) 0);
}
.agent-metric-ring.reliability {
  background: conic-gradient(var(--status-confirmed) calc(var(--pct) * 1%), rgba(255,255,255,0.08) 0);
}
.agent-metric-ring span {
  background: var(--bg-primary);
  width: 50px; height: 50px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.agent-metric-label { font-size: 0.6875rem; color: var(--text-muted); }
.agent-signal-row {
  display: flex;
  gap: 1rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  padding: 0.75rem 0;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.agent-signal .signal-num { font-weight: 600; color: var(--text-secondary); }
.agent-signal.good .signal-num { color: var(--status-confirmed); }
.agent-signal.bad .signal-num { color: var(--status-disputed); }
.agent-signal.warn { color: var(--status-disputed); }
.agent-signal.warn .signal-num { color: var(--status-disputed); font-weight: 700; }
.agent-skills-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.375rem;
  padding-top: 0.75rem;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* Tasks Tab */
.tasks-list { max-height: 600px; overflow-y: auto; }
.task-row {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.8125rem;
}
.task-status {
  font-size: 0.75rem; /* Increased font size */
  padding: 0.125rem 0.5rem;
  border-radius: 3px;
  font-weight: 500;
  min-width: 65px;
  text-align: center;
}
.task-agent { color: var(--accent-primary); font-size: 0.75rem; min-width: 120px; }
.task-dur { color: var(--text-muted); font-size: 0.75rem; min-width: 45px; text-align: right; }
.task-time { color: var(--text-muted); font-size: 0.6875rem; min-width: 90px; }
.task-desc { color: var(--text-secondary); font-size: 0.75rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Activity Timeline */
.timeline { max-height: 500px; overflow-y: auto; }
.timeline-entry {
  display: flex;
  gap: 0.75rem;
  padding: 0.375rem 0;
  font-size: 0.8125rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.timeline-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.timeline-dot.green { background: var(--status-confirmed); }
.timeline-dot.purple { background: var(--accent-primary); }
.timeline-dot.yellow { background: var(--status-unverified); }
.timeline-dot.red { background: var(--status-disputed); }
.timeline-time { color: var(--text-muted); font-size: 0.6875rem; min-width: 55px; }
.timeline-text { color: var(--text-secondary); font-size: 0.8125rem; }
.timeline-agent { color: var(--accent-primary); font-weight: 500; }

/* Skills Grid */
.skills-grid-wrap { overflow-x: auto; }
.skills-grid {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.8125rem;
}
.skills-grid th, .skills-grid td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.skills-grid-corner { width: 160px; }
.skills-grid-agent {
  font-weight: 500;
  color: var(--text-secondary);
  text-align: center;
  font-size: 0.75rem;
  min-width: 100px;
}
.skills-grid-skill {
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
}
.skills-grid-cell {
  text-align: center;
  cursor: default;
  font-size: 0.875rem;
  transition: background 0.15s;
}
.skills-grid-cell.enabled {
  color: var(--accent-primary);
  cursor: pointer;
}
.skills-grid-cell.enabled:hover { background: rgba(167, 139, 250, 0.1); }
.skills-grid-cell.disabled {
  color: var(--text-muted);
  cursor: pointer;
}
.skills-grid-cell.disabled:hover { background: rgba(255,255,255,0.05); }
.skills-grid-cell.unbound { color: transparent; }
.skills-grid-cell.toggling { opacity: 0.5; pointer-events: none; }

/* Consensus Tab */
.consensus-runs { display: flex; flex-direction: column; gap: 0.5rem; }
.consensus-run {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  overflow: hidden;
}
.consensus-run-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  cursor: pointer;
  font-size: 0.8125rem;
}
.consensus-run-header:hover { background: rgba(255,255,255,0.03); }
.expand-icon {
  font-family: monospace;
  font-size: 1rem;
  color: var(--text-muted);
  width: 1rem;
  text-align: center;
}
.consensus-run-info { flex: 1; }
.consensus-task-id { color: var(--text-primary); font-family: monospace; font-size: 0.75rem; font-weight: 500; }
.consensus-meta { color: var(--text-muted); font-size: 0.6875rem; margin-left: 0.75rem; }
.consensus-counts { display: flex; gap: 0.375rem; }
.consensus-tag {
  font-size: 0.75rem; /* Increased font size */
  padding: 0.125rem 0.5rem;
  border-radius: 3px;
  font-weight: 500;
}
.consensus-tag.confirmed { background: rgba(74,222,128,0.15); color: var(--status-confirmed); }
.consensus-tag.disputed { background: rgba(239,68,68,0.15); color: var(--status-disputed); }
.consensus-tag.unverified { background: rgba(251,191,36,0.15); color: var(--status-unverified); }
.consensus-tag.unique { background: rgba(107,114,128,0.15); color: var(--status-unique); }
.consensus-tag.new { background: rgba(96,165,250,0.15); color: var(--status-new); }
.consensus-run-body { padding: 0 1rem 1rem; }
.consensus-signal {
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.8125rem;
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.consensus-signal:last-child { border-bottom: none; }
.consensus-agent { color: var(--accent-primary); font-size: 0.75rem; }
.consensus-arrow { color: var(--text-muted); font-size: 0.75rem; }
.consensus-evidence {
  width: 100%;
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 0.25rem;
  line-height: 1.4;
}

/* Memory Tab */
.memory-agent-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}
.memory-agent-pill {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-button);
  color: var(--text-secondary);
  padding: 0.5rem 1rem;
  font-size: 0.8125rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.375rem;
}
.memory-agent-pill:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.memory-agent-pill.active { background: rgba(167,139,250,0.15); border-color: var(--accent-primary); color: var(--accent-primary); }
.memory-controls { margin-bottom: 1.5rem; }
.memory-select {
  padding: 0.5rem 1rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-button);
  color: var(--text-primary);
  font-size: 0.875rem;
  min-width: 250px;
}
.memory-select:focus { border-color: var(--accent-primary); outline: none; }
.memory-panels { display: flex; flex-direction: column; gap: 1rem; }
.memory-md {
  padding: 1rem;
  font-size: 0.8125rem;
  line-height: 1.6;
  color: var(--text-secondary);
}
.memory-md h1 { font-size: 1.125rem; color: var(--text-primary); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h2 { font-size: 0.9375rem; color: var(--text-primary); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h3 { font-size: 0.8125rem; color: var(--text-primary); margin: 0.75rem 0 0.375rem; font-weight: 600; }
.memory-md h4 { font-size: 0.8125rem; color: var(--text-secondary); margin: 0.5rem 0 0.25rem; font-weight: 600; }
.memory-md ul { padding-left: 1.25rem; margin: 0.375rem 0; }
.memory-md li { margin: 0.25rem 0; }
.memory-md a { color: var(--accent-primary); text-decoration: none; }
.memory-md a:hover { text-decoration: underline; }
.memory-md strong { color: var(--text-primary); }
.memory-md code {
  background: rgba(255,255,255,0.08);
  padding: 0.125rem 0.375rem;
  border-radius: 3px;
  font-size: 0.75rem;
}
.memory-md p { margin: 0.375rem 0; }
.memory-code {
  background: rgba(0,0,0,0.3);
  border-radius: var(--radius-button);
  padding: 0.75rem;
  font-size: 0.75rem;
  overflow-x: auto;
  margin: 0.5rem 0;
}
.memory-file {
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 0.25rem 0;
}
.memory-file:last-child { border-bottom: none; }
.memory-file.cognitive { border-left: 2px solid var(--accent-primary); padding-left: 0.75rem; }
.memory-file-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  padding: 0.375rem 0;
  font-size: 0.8125rem;
}
.memory-file-header:hover { color: var(--accent-primary); }
.memory-filename { font-family: monospace; color: var(--text-primary); font-size: 0.75rem; }
.memory-desc { color: var(--text-muted); font-size: 0.75rem; }
.memory-file-content {
  background: rgba(0,0,0,0.3);
  border-radius: var(--radius-button);
  padding: 0.75rem;
  font-size: 0.6875rem;
  line-height: 1.5;
  overflow-x: auto;
  white-space: pre-wrap;
  color: var(--text-secondary);
  margin: 0.25rem 0 0.5rem;
}
.memory-task-date { white-space: nowrap; color: var(--text-muted); font-size: 0.75rem; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
  font-size: 0.875rem;
}

/* Responsive */
@media (max-width: 1024px) {
  .main { padding: 1.5rem; }
  .agent-cards { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .stat-cards { grid-template-columns: 1fr; }
  .agent-score-metrics { display: none; }
  .agent-signal-row { flex-wrap: wrap; }
  .nav-tabs { gap: 0; }
}

</style>
</head>
<body>
  <!-- Auth Gate -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h1>gossipcat</h1>
      <p class="auth-subtitle">Enter your dashboard key to continue</p>
      <form id="auth-form">
        <input type="password" id="auth-key" placeholder="Dashboard key" autocomplete="off" autofocus>
        <button type="submit">Unlock</button>
      </form>
      <p id="auth-error" class="auth-error" hidden>Invalid key. Check your terminal for the correct key.</p>
    </div>
  </div>

  <!-- Dashboard (hidden until authenticated) -->
  <div id="dashboard" class="dashboard" hidden>
    <nav class="nav">
      <div class="nav-brand">gossipcat</div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="overview">Overview</button>
        <button class="nav-tab" data-tab="agents">Agents</button>
        <button class="nav-tab" data-tab="tasks">Tasks</button>
        <button class="nav-tab" data-tab="consensus">Consensus</button>
        <button class="nav-tab" data-tab="skills">Skills</button>
        <button class="nav-tab" data-tab="memory">Memory</button>
      </div>
      <div class="nav-status">
        <span id="ws-status" class="status-dot offline"></span>
        <span id="ws-label">Disconnected</span>
      </div>
    </nav>

    <main class="main">
      <div id="tab-overview" class="tab-content active"></div>
      <div id="tab-agents" class="tab-content"></div>
      <div id="tab-tasks" class="tab-content"></div>
      <div id="tab-consensus" class="tab-content"></div>
      <div id="tab-skills" class="tab-content"></div>
      <div id="tab-memory" class="tab-content"></div>
    </main>
  </div>

  <script>
// packages/dashboard/src/app.js

// ── Shared Utilities ────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// ── API Helper ──────────────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch(`/dashboard/api/${path}`, { credentials: 'include' });
  if (res.status === 401) {
    throw new Error('Unauthorized');
  }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `API error: ${res.status}`);
  }
  return res.json();
}

// ── Auth ─────────────────────────────────────────────────────────────────────
const authGate = document.getElementById('auth-gate');
const dashboard = document.getElementById('dashboard');
const authForm = document.getElementById('auth-form');
const authError = document.getElementById('auth-error');

function showAuth() {
  authGate.hidden = false;
  dashboard.hidden = true;
  // Close WebSocket if open
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
}

function showDashboard() {
  authGate.hidden = true;
  dashboard.hidden = false;
  connectWs();
  loadTab('overview');
}

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = authForm.querySelector('button');
  submitBtn.disabled = true;
  const key = document.getElementById('auth-key').value.trim();
  try {
    const res = await fetch('/dashboard/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key }),
      credentials: 'include',
    });
    if (!res.ok) {
      authError.hidden = false;
      return;
    }
    // Verify the cookie was actually set by making an authenticated call
    const verify = await fetch('/dashboard/api/overview', { credentials: 'include' });
    if (verify.ok) {
      authError.hidden = true;
      showDashboard();
    } else {
      authError.hidden = false;
    }
  } catch {
    authError.hidden = false;
  } finally {
    submitBtn.disabled = false;
  }
});

// ── Tab Routing ──────────────────────────────────────────────────────────────
const tabs = document.querySelectorAll('.nav-tab');
const tabContents = document.querySelectorAll('.tab-content');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.disabled) return;
    tabs.forEach(t => t.classList.remove('active'));
    tabContents.forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    loadTab(tab.dataset.tab);
  });
});

// ── WebSocket ────────────────────────────────────────────────────────────────
let ws = null;
const wsStatus = document.getElementById('ws-status');
const wsLabel = document.getElementById('ws-label');
const eventListeners = new Set();

function onDashboardEvent(fn) { eventListeners.add(fn); }
function offDashboardEvent(fn) { eventListeners.delete(fn); }

function connectWs() {
  if (ws) return; // already connected
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/dashboard/ws`);

  ws.onopen = () => {
    wsStatus.className = 'status-dot online';
    wsLabel.textContent = 'Connected';
  };

  ws.onclose = () => {
    wsStatus.className = 'status-dot offline';
    wsLabel.textContent = 'Disconnected';
    ws = null;
    // Only reconnect if dashboard is visible (not on auth gate)
    if (!dashboard.hidden) {
      setTimeout(connectWs, 3000);
    }
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      for (const fn of eventListeners) fn(event);
    } catch { /* ignore */ }
  };
}

// ── Tab Loading ──────────────────────────────────────────────────────────────
async function loadTab(name) {
  // Clean up overview event handler when switching away
  if (name !== 'overview' && typeof _overviewEventHandler !== 'undefined' && _overviewEventHandler) {
    offDashboardEvent(_overviewEventHandler);
    _overviewEventHandler = null;
  }
  switch (name) {
    case 'overview': return renderOverview();
    case 'agents': return renderAgents();
    case 'tasks': return renderTasks();
    case 'skills': return renderSkills();
    case 'consensus': return renderConsensus();
    case 'memory': return renderMemory();
  }
}

        task_dispatched: 'purple', agent_connected: 'purple', agent_disconnected: 'purple',
        skill_changed: 'yellow', consensus_started: 'yellow',
        task_failed: 'red',
      };
      const time = new Date(event.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const color = colors[event.type] || 'purple';
      const text = formatEvent(event);
      const entry = document.createElement('div');
      entry.className = 'timeline-entry';
      entry.innerHTML = `
        <div class="timeline-dot ${color}"></div>
        <div class="timeline-time">${time}</div>
        <div class="timeline-text"></div>

      entry.querySelector('.timeline-text').textContent = text;

      const placeholder = timeline.querySelector('.empty-state');

      timeline.prepend(entry);

  } catch (err) {
    container.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

function formatEvent(event) {
  const d = event.data || {};
  switch (event.type) {
    case 'task_dispatched': return `Task dispatched to ${d.agentId || '?'}`;
    case 'task_completed': return `Task completed by ${d.agentId || '?'}`;
    case 'task_failed': return `Task failed on ${d.agentId || '?'}`;
    case 'consensus_started': return `Consensus started (${d.agentCount || '?'} agents)`;
    case 'consensus_complete': return `Consensus complete — ${d.confirmed || 0} confirmed`;
    case 'agent_connected': return `${d.agentId || '?'} connected`;
    case 'agent_disconnected': return `${d.agentId || '?'} disconnected`;
    case 'skill_changed': return `Skill ${d.skill || '?'} toggled for ${d.agentId || '?'}`;
    default: return event.type;
  }
}

async function renderSkills() {

      return;

    if (skillNames.length === 0) {

      return;
    }

    container.innerHTML = `

          <div class="skills-grid-wrap">

                ${skillNames.map(skill => `
                  <tr>

                    ${agentIds.map(agentId => {
                      const slot = index[agentId]?.[skill];
                      if (!slot) return '<td class="skills-grid-cell unbound"></td>';
                      const cls = slot.enabled ? 'enabled' : 'disabled';
                      return `<td class="skills-grid-cell ${cls}" data-agent="${escapeHtml(agentId)}" data-skill="${escapeHtml(skill)}" data-enabled="${slot.enabled}">${slot.enabled ? '&#10003;' : '&#10005;'}</td>`;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    // Click handlers for toggle cells
    container.querySelectorAll('.skills-grid-cell[data-agent]').forEach(cell => {
      cell.addEventListener('click', async () => {
        const agentId = cell.dataset.agent;
        const skill = cell.dataset.skill;
        const currentlyEnabled = cell.dataset.enabled === 'true';
        const newEnabled = !currentlyEnabled;

        cell.classList.add('toggling');
        try {
          const res = await fetch('/dashboard/api/skills/bind', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent_id: agentId, skill, enabled: newEnabled }),

            setTimeout(() => { cell.style.outline = ''; cell.title = ''; }, 2000);
          }
        } catch {
          cell.style.outline = '2px solid var(--status-disputed)';
          setTimeout(() => { cell.style.outline = ''; }, 2000);
        }
        cell.classList.remove('toggling');
      });
    });

    container.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }

            <div class="memory-file-header" onclick="this.nextElementSibling.hidden = !this.nextElementSibling.hidden">
              <span class="expand-icon">+</span>
              <span class="memory-filename">${escapeHtml(k.filename)}</span>
              <span class="memory-desc">${escapeHtml(desc)}</span>
              ${isCognitive ? '<span class="agent-badge">cognitive</span>' : ''}
            </div>
            <pre class="memory-file-content" hidden>${escapeHtml(k.content)}</pre>
          </div>
        `;
      }).join('');

      sections.push(`
        <div class="panel">
          <div class="panel-title">Knowledge Files (${data.knowledge.length})</div>
          ${files}
        </div>
      `);
    }

    // Tasks
    if (data.tasks.length > 0) {
      const rows = data.tasks.slice(-50).reverse().map(t => `
        <tr>
          <td class="memory-task-date">${t.timestamp ? new Date(t.timestamp).toLocaleDateString() : '-'}</td>
          <td>${escapeHtml(String(t.task || t.result || '-').slice(0, 120))}</td>
          <td>${t.importance != null ? t.importance : '-'}</td>
        </tr>
      `).join('');

      sections.push(`
        <div class="panel">
          <div class="panel-title">Recent Tasks (${data.tasks.length})</div>
          <div class="skills-grid-wrap">
            <table class="skills-grid">
              <thead><tr><th>Date</th><th>Summary</th><th>Imp.</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `);
    }

    if (sections.length === 0) {
      content.innerHTML = '<div class="empty-state">No memory data for this agent.</div>';
    } else {
      content.innerHTML = `<div class="memory-panels">${sections.join('')}</div>`;

      // Wire up knowledge/ links in MEMORY.md to expand inline
      const mdContent = document.getElementById('memory-md-content');
      if (mdContent) {
        mdContent.querySelectorAll('a').forEach(link => {
          const href = link.getAttribute('href');
          // Prevent all local links from navigating
          if (href && !href.startsWith('http')) {
            link.href = '#';
          }
          if (!href || !href.startsWith('knowledge/')) return;
          const filename = href.replace('knowledge/', '');
          const entry = knowledgeMap[filename];
          if (!entry) { link.style.opacity = '0.5'; return; }
          link.style.cursor = 'pointer';
          link.addEventListener('click', (e) => {
            e.preventDefault();
            let detail = link.nextElementSibling;
            if (detail && detail.classList.contains('memory-inline-detail')) {
              detail.hidden = !detail.hidden;
              return;
            }
            detail = document.createElement('pre');
            detail.className = 'memory-file-content memory-inline-detail';
            detail.textContent = entry.content;
            link.parentNode.insertBefore(detail, link.nextSibling);
          });
        });
      }
    }
  } catch (err) {
    content.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

function renderMarkdown(md) {
  // Extract code blocks BEFORE escaping to prevent double-encoding
  const codeBlocks = [];
  let processed = md.replace(/```[\s\S]*?```/g, (m) => {
    const content = m.slice(3, -3).replace(/^[^\n]*\n/, ''); // strip language hint
    const placeholder = `\x00CODE${codeBlocks.length}\x00`;
    codeBlocks.push('<pre class="memory-code">' + escapeHtml(content) + '</pre>');
    return placeholder;
  });

  const inlineCodes = [];
  processed = processed.replace(/`([^`]+)`/g, (_, code) => {
    const placeholder = `\x00INLINE${inlineCodes.length}\x00`;
    inlineCodes.push('<code>' + escapeHtml(code) + '</code>');
    return placeholder;
  });

  // Now escape the rest
  let html = escapeHtml(processed);

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links: [text](url) — only allow safe schemes
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
    if (/^(https?:\/\/|knowledge\/|#)/.test(url)) return `<a href="${url}">${text}</a>`;
    return text; // strip unsafe links (javascript:, data:, etc.)
  });

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs: double newlines
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs around block elements
  html = html.replace(/<p>\s*(<(?:h[1-4]|ul|pre|li)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-4]|ul|pre|li)>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  // Restore code blocks and inline code from placeholders
  codeBlocks.forEach((block, i) => { html = html.replace(`\x00CODE${i}\x00`, block); });
  inlineCodes.forEach((code, i) => { html = html.replace(`\x00INLINE${i}\x00`, code); });

  return html;
}
