<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gossipcat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════════════
   GOSSIPCAT DASHBOARD — Design System v2
   ═══════════════════════════════════════════════════ */

:root {
  --bg: #08090e;
  --surface: #0e1017;
  --surface-raised: #131620;
  --surface-hover: #181c28;
  --border: rgba(255,255,255,0.05);
  --border-active: rgba(167,139,250,0.25);
  --text: #e4e6ef;
  --text-2: #a0a4b8;
  --text-3: #7c8099;
  --accent: #a78bfa;
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.12);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-glow: rgba(251,191,36,0.1);
  --blue: #60a5fa;
  --blue-glow: rgba(96,165,250,0.1);
  --body: 'Outfit', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
[hidden] { display: none !important; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
  isolation: isolate;
}

/* ── Atmosphere ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -2;
  background:
    radial-gradient(ellipse 60% 45% at 20% -8%, rgba(167,139,250,0.04) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 85% 105%, rgba(52,211,153,0.02) 0%, transparent 55%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.012;
}

/* ── Scrollbar ──────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }

/* ── Accessibility ──────────────────────────────── */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── Auth Gate ──────────────────────────────────── */
.auth-gate {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  max-width: 380px; width: 100%;
}
.auth-card h1 { color: var(--accent); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
.auth-subtitle { color: var(--text-3); margin-bottom: 1.5rem; font-size: 0.875rem; }
.auth-card input {
  width: 100%; padding: 0.75rem 1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 0.875rem; font-family: var(--mono);
  margin-bottom: 1rem; outline: none;
}
.auth-card input:focus { border-color: var(--accent); }
.auth-card button {
  width: 100%; padding: 0.75rem;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 8px;
  font-weight: 600; font-size: 0.875rem; cursor: pointer;
  transition: opacity 0.15s;
}
.auth-card button:hover { opacity: 0.9; }
.auth-error { color: var(--red); font-size: 0.8rem; margin-top: 0.75rem; }

/* ── Topbar ─────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 50px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.logo {
  font-size: 16px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.02em; text-decoration: none;
}
.logo:hover { opacity: 0.9; }
.sep { color: var(--text-3); font-size: 12px; }
.crumb { color: var(--text-2); font-size: 13px; font-weight: 500; }
.nav-right { display: flex; align-items: center; gap: 14px; }
.ws-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3);
  background: var(--surface-raised); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 7px;
}
.ws-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.ws-dot.online {
  background: var(--green);
  box-shadow: 0 0 8px rgba(52,211,153,0.5);
  animation: glow 2.5s ease-in-out infinite;
}
.ws-dot.offline { background: var(--red); }

@keyframes glow {
  0%, 100% { box-shadow: 0 0 4px rgba(52,211,153,0.3); }
  50% { box-shadow: 0 0 10px rgba(52,211,153,0.6); }
}

/* ── Main Content ───────────────────────────────── */
.page {
  max-width: 1200px; margin: 0 auto;
  padding: 24px 32px;
  height: calc(100vh - 50px); overflow-y: auto;
}

/* ── Section Headers ────────────────────────────── */
.section { margin-bottom: 28px; }
.sh {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.sh-left { display: flex; align-items: center; gap: 10px; }
.sh-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
.sh-count {
  font-size: 10px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); background: var(--surface-raised);
  padding: 2px 8px; border-radius: 4px;
}
.sh-action {
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); cursor: pointer;
  transition: color 0.15s; letter-spacing: 0.02em;
  background: none; border: none;
}
.sh-action:hover { color: var(--accent); }

/* ── Status Bar ────────────────────────────────── */
.status-bar { padding: 14px 20px !important; margin-bottom: 16px; }
.status-bar .sh { display: none; }
.status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.sb-left, .sb-right { display: flex; align-items: center; gap: 10px; }
.sb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
.sb-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
.sb-stat { color: var(--text-2); font-size: 13px; font-family: var(--mono); }
.sb-sep { color: var(--text-3); }
.sb-action { color: var(--amber); font-size: 13px; font-weight: 600; font-family: var(--mono); }
.sb-clear { color: var(--green); font-size: 13px; font-family: var(--mono); }

/* ── Agent Cards ────────────────────────────────── */
.agent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.ag {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 12px; cursor: pointer; transition: all 0.2s; position: relative;
  color: var(--text); text-align: center;
}
.ag:hover {
  border-color: var(--border-active); background: var(--surface-raised);
  transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.ag::before {
  content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
  border-radius: 0 2px 2px 0; background: var(--card-color, var(--text-3));
  opacity: 0.5; transition: opacity 0.2s;
}
.ag:hover::before { opacity: 1; }

/* Trust ring */
.ag-ring-wrap { position: relative; width: 48px; height: 48px; margin: 0 auto 8px; }
.ag-ring { width: 48px; height: 48px; }
.ag-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-family: var(--mono); }
.ag-last { font-size: 11px; color: var(--text-3); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 4px; text-align: center; }
.ag-time { opacity: 0.7; }
.ag-name { font-size: 12px; font-weight: 600; display: block; margin-top: 2px; }
.ag-overflow { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; min-height: 100px; border-style: dashed; }
.ag-overflow:hover { border-color: var(--accent); }
.ag-more-count { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--text-2); }
.ag-more-label { font-size: 12px; color: var(--text-3); }

/* ── Panels ─────────────────────────────────────── */
.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column;
}
.panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 13px; font-weight: 600; }
.panel-body { flex: 1; overflow-y: auto; max-height: 280px; }

/* ── Pills ──────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10.5px; font-family: var(--mono); font-weight: 600;
  padding: 3px 7px; border-radius: 5px;
}
.pill-g { background: var(--green-glow); color: var(--green); }
.pill-r { background: var(--red-glow); color: var(--red); }
.pill-y { background: var(--amber-glow); color: var(--amber); }

/* ── Run Timeline ──────────────────────────────────── */
.run-list { display: flex; flex-direction: column; gap: 8px; }
.run-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.run-card.run-open { border-color: rgba(167,139,250,0.3); }
.run-header { padding: 12px 16px; cursor: pointer; transition: background 0.1s; }
.run-header:hover { background: var(--surface-raised); }
.run-top { display: flex; align-items: center; gap: 10px; }
.run-expand { color: var(--text-3); font-size: 10px; width: 14px; transition: color 0.15s; }
.run-card.run-open .run-expand { color: var(--accent); }
.run-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.run-agents { display: flex; gap: 4px; }
.run-agent-chip { background: var(--surface-raised); color: var(--text-2); font-size: 10px; font-family: var(--mono); font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.run-agent-more { color: var(--text-3); font-size: 10px; padding: 2px 4px; }
.run-time { color: var(--text-3); font-size: 12px; font-family: var(--mono); white-space: nowrap; }
.run-pills { display: flex; gap: 6px; margin-top: 6px; padding-left: 24px; }
.pill-b { background: rgba(167,139,250,0.15); color: var(--accent); }

/* ── Findings ──────────────────────────────────────── */
.run-findings { padding: 0 16px 12px; }
.finding-row { display: flex; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border); }
.finding-tag { font-size: 10px; font-family: var(--mono); font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; height: fit-content; margin-top: 2px; }
.tag-g { background: rgba(52,211,153,0.15); color: var(--green); }
.tag-r { background: rgba(248,113,113,0.15); color: var(--red); }
.tag-y { background: rgba(251,191,36,0.15); color: var(--amber); }
.tag-u { background: rgba(167,139,250,0.15); color: var(--accent); }
.tag-b { background: rgba(167,139,250,0.15); color: var(--accent); }
.finding-body { flex: 1; min-width: 0; }
.finding-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.finding-attr { font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--mono); }

/* ── Knowledge ─────────────────────────────────── */
.know-list { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 4px; }
.know-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: var(--mono); color: var(--text-2); cursor: pointer; transition: all 0.15s; }
.know-item:hover { background: var(--surface-raised); color: var(--text); border-color: var(--accent); }
.know-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding-top: 4px; }
.know-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.15s; text-align: center; }
.know-card:hover { background: var(--surface-raised); border-color: var(--accent); }
.know-card-initials { font-size: 16px; font-weight: 700; font-family: var(--mono); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--surface-hover); }
.know-card-name { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); }
.know-card-desc { font-size: 11px; color: var(--text-3); }

/* ── Task History ──────────────────────────────── */
.task-history-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.task-history-row:last-child { border-bottom: none; }
.task-history-date { color: var(--accent); font-family: var(--mono); font-size: 11px; min-width: 50px; font-weight: 600; }
.task-history-time { color: var(--text-3); font-family: var(--mono); font-size: 11px; min-width: 55px; }
.task-history-desc { color: var(--text-2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Pill Filters ──────────────────────────────── */
.pill-filter { cursor: pointer; transition: all 0.15s; }
.pill-filter:hover { opacity: 0.8; transform: scale(1.05); }
.pill-active { outline: 2px solid currentColor; outline-offset: 1px; }

/* ── Memory Browser (detail view) ───────────────── */
.memory-md { padding: 1rem; font-size: 13px; line-height: 1.6; color: var(--text-2); }
.memory-md h1 { font-size: 1.125rem; color: var(--text); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h2 { font-size: 0.9375rem; color: var(--text); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h3 { font-size: 0.8125rem; color: var(--text); margin: 0.75rem 0 0.375rem; font-weight: 600; }
.memory-md ul { padding-left: 1.25rem; margin: 0.375rem 0; }
.memory-md li { margin: 0.25rem 0; }
.memory-md a { color: var(--accent); text-decoration: none; }
.memory-md a:hover { text-decoration: underline; }
.memory-md strong { color: var(--text); }
.memory-md code { background: rgba(255,255,255,0.06); padding: 0.125rem 0.375rem; border-radius: 3px; font-size: 0.8rem; font-family: var(--mono); }
.memory-md p { margin: 0.375rem 0; }
.memory-code { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.75rem; font-size: 0.75rem; font-family: var(--mono); overflow-x: auto; margin: 0.5rem 0; }
.memory-file { border-bottom: 1px solid rgba(255,255,255,0.04); padding: 0.25rem 0; }
.memory-file:last-child { border-bottom: none; }
.memory-file.cognitive { border-left: 2px solid var(--accent); padding-left: 0.75rem; }
.memory-file-header { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.375rem 0; font-size: 13px; }
.memory-file-header:hover { color: var(--accent); }
.memory-filename { font-family: var(--mono); color: var(--text); font-size: 0.75rem; }
.memory-desc { color: var(--text-3); font-size: 0.75rem; }
.memory-file-content {
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.75rem;
  font-size: 0.7rem; font-family: var(--mono); line-height: 1.5;
  overflow-x: auto; white-space: pre-wrap; color: var(--text-2);
  margin: 0.25rem 0 0.5rem;
}

/* ── Detail Views ───────────────────────────────── */
.detail-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-avatar {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-family: var(--mono); font-weight: 600;
}
.detail-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.detail-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }
.detail-stats { display: flex; gap: 10px; margin-bottom: 24px; }
.detail-stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; flex: 1; text-align: center;
}
.detail-stat-val { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.detail-stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* Filter buttons */
.filters { display: flex; gap: 4px; margin-bottom: 14px; }
.filter-btn {
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 12px; font-size: 12px; font-family: var(--mono); color: var(--text-3);
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: var(--text); border-color: var(--border-active); }
.filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(167,139,250,0.08); }

/* Search */
.search-input {
  width: 100%; padding: 8px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: var(--body);
  margin-bottom: 14px; outline: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-3); }

/* ── Layout Grids ───────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Empty / Loading / Error States ─────────────── */
.empty-state { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }
.loading { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }

/* ── Animations ─────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.section:nth-child(1) { animation: fadeUp 0.35s ease-out; }
.section:nth-child(2) { animation: fadeUp 0.35s ease-out 0.04s both; }
.section:nth-child(3) { animation: fadeUp 0.35s ease-out 0.08s both; }
.section:nth-child(4) { animation: fadeUp 0.35s ease-out 0.12s both; }
.section:nth-child(5) { animation: fadeUp 0.35s ease-out 0.16s both; }

/* ── Task Rows ─────────────────────────────────── */
.task-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.task-row:last-child { border-bottom: none; }
.task-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.task-agent { color: var(--accent); font-weight: 500; font-family: var(--mono); font-size: 12px; min-width: 140px; }
.task-desc { color: var(--text-2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-meta { color: var(--text-3); font-family: var(--mono); font-size: 11px; min-width: 50px; text-align: right; }

/* ── Live Task Strip ───────────────────────────────────────────────────── */
.live-strip { padding: 8px 20px !important; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; }
.live-strip.live-active { background: rgba(251,191,36,0.04); border-color: rgba(251,191,36,0.12); }
.live-strip .sh { display: none; }
.live-task { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 13px; }
.live-icon { font-size: 14px; }
.live-agent { color: var(--accent); font-weight: 600; font-family: var(--mono); font-size: 12px; min-width: 140px; }
.live-desc { color: var(--text-2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.live-elapsed { color: var(--amber); font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; }
.live-taskid { color: var(--text-3); font-family: var(--mono); font-size: 11px; background: var(--surface); padding: 1px 5px; border-radius: 3px; }


/* ── Responsive ─────────────────────────────────── */
@media (max-width: 1200px) {
  .page { padding: 20px 24px; }
}
@media (max-width: 1000px) {
  .agent-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 900px) {
  .two-col { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .topbar { padding: 0 16px; }
  .page { padding: 16px; }
  .agent-grid { grid-template-columns: 1fr; }
}

/* ── Agent stat bars ──────────────────────────────── */
.ag-stats { display: flex; flex-direction: column; gap: 2px; width: 100%; padding: 2px 4px 0; }

// packages/dashboard/src/app.js — Router, API, Auth, WebSocket, Hub orchestration

// ── Utilities ──────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function formatTokens(n) {
  if (n == null || n === 0) return '0';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (diff < 0) return 'just now';
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function agentInitials(id) {
  return id.split('-').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function agentColor(agent) {
  if (!agent || (!agent.online && agent.scores?.signals === 0)) return 'var(--text-3)';
  if (agent.provider === 'google') return 'var(--blue)';
  return 'var(--accent)';
}

// ── Task Strip — active tasks when working, recent completed when idle ──
async function renderTaskStrip(container) {
  try {
    // Try active tasks first
    const activeData = await api('active-tasks');
    const MAX_AGE_MS = 30 * 60 * 1000;
    const now = Date.now();
    const active = (activeData.tasks || []).filter(t => now - new Date(t.startedAt).getTime() < MAX_AGE_MS);

    container.innerHTML = '';
    container.hidden = false;

    if (active.length > 0) {
      // Live mode: agents are working
      container.className = 'section live-strip live-active';
      for (const t of active) {
        const desc = escapeHtml((t.task || '').replace(/\n.*/s, ''));
        const row = document.createElement('div');
        row.className = 'live-task';
        row.innerHTML =
          '<span class="live-icon">&#9889;</span>' +
          '<span class="live-agent">' + escapeHtml(t.agentId) + '</span>' +
          '<span class="live-desc">' + desc + '</span>' +
          '<span class="live-elapsed">' + timeAgo(t.startedAt) + '</span>';
        container.appendChild(row);
      }
      return;
    }

    // Idle mode: show recent completed tasks
    const taskData = await api('tasks');
    const recent = (taskData.tasks || []).slice(0, 10);
    if (recent.length === 0) { container.hidden = true; return; }

    container.className = 'section live-strip';
    // Add section title
    const title = document.createElement('div');
    title.className = 'section-header';
    title.innerHTML = '<h2>Recent Tasks</h2><span class="section-count">' + recent.length + ' tasks</span>';
    container.appendChild(title);

    for (const t of recent) {
      const color = t.status === 'completed' ? 'var(--green)' : t.status === 'failed' ? 'var(--red)' : 'var(--text-3)';
      const icon = t.status === 'completed' ? '&#10003;' : t.status === 'failed' ? '&#10007;' : '&#8943;';
      const desc = escapeHtml((t.task || '').replace(/\n.*/s, ''));
      const dur = t.duration > 0 ? (t.duration / 1000).toFixed(1) + 's' : '';
      const taskId = t.taskId ? escapeHtml(t.taskId.slice(0, 8)) : '';
      const row = document.createElement('div');
      row.className = 'live-task';
      row.innerHTML =
        '<span class="live-icon" style="color:' + color + '">' + icon + '</span>' +
        '<span class="live-agent">' + escapeHtml(t.agentId) + '</span>' +
        (taskId ? '<span class="live-taskid">' + taskId + '</span>' : '') +
        '<span class="live-desc">' + desc + '</span>' +
        (dur ? '<span class="live-elapsed" style="color:var(--text-3)">' + dur + '</span>' : '') +
        '<span class="live-elapsed">' + timeAgo(t.timestamp) + '</span>';
      container.appendChild(row);
    }
  } catch { container.hidden = true; }
}

// ── API Helper ─────────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch('/dashboard/api/' + path, { credentials: 'include' });
  if (res.status === 401) { showAuth(); throw new Error('Unauthorized'); }
  if (!res.ok) {
    const b = await res.json().catch(() => ({}));
    throw new Error(b.error || 'API error: ' + res.status);
  }
  return res.json();
}

// ── Auth ───────────────────────────────────────────────────────────────
const authGate = document.getElementById('auth-gate');
const dashboard = document.getElementById('dashboard');
const authForm = document.getElementById('auth-form');
const authError = document.getElementById('auth-error');

function showAuth() {
  authGate.hidden = false;
  dashboard.hidden = true;
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
}

function showDashboard() {
  authGate.hidden = true;
  dashboard.hidden = false;
  connectWs();
}

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = authForm.querySelector('button');
  btn.disabled = true;
  const key = document.getElementById('auth-key').value.trim();
  try {
    const res = await fetch('/dashboard/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key }),
      credentials: 'include',
    });
    if (!res.ok) { authError.hidden = false; return; }
    const verify = await fetch('/dashboard/api/overview', { credentials: 'include' });
    if (verify.ok) { authError.hidden = true; showDashboard(); route(); }
    else { authError.hidden = false; }
  } catch { authError.hidden = false; }
  finally { btn.disabled = false; }
});

// ── Router ─────────────────────────────────────────────────────────────
function getRoute() {
  const hash = location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  return { path: '/' + parts.join('/'), parts };
}

function navigate(path) { location.hash = path; }

let currentCleanup = null;

async function route() {
  // Clean up previous view's event listeners
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }

  const { path, parts } = getRoute();
  const app = document.getElementById('app');
  updateBreadcrumb(parts);

  // Hub
  if (path === '/' || path === '/overview') return renderHub(app);

  // Detail views
  if (path === '/team') return renderAgentDetail(app);
  if (parts[0] === 'team' && parts[1]) return renderAgentDetail(app, decodeURIComponent(parts[1]));
  if (path === '/tasks') return renderTasksDetail(app);
  if (parts[0] === 'consensus' && parts[1]) return renderConsensusDetail(app, decodeURIComponent(parts[1]));
  if (path === '/signals') return renderSignalsDetail(app);
  if (parts[0] === 'knowledge' && parts[1]) return renderKnowledgeDetail(app, decodeURIComponent(parts[1]));

  app.innerHTML = '<div class="empty-state">Page not found</div>';
}

function updateBreadcrumb(parts) {
  const el = document.getElementById('breadcrumb-page');
  if (!el) return;
  if (parts.length === 0) { el.textContent = 'Overview'; return; }
  el.textContent = parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' / ');
}

window.addEventListener('hashchange', route);

// ── WebSocket ──────────────────────────────────────────────────────────
let ws = null;
const wsStatus = document.getElementById('ws-status');
const wsLabel = document.getElementById('ws-label');
const eventListeners = new Set();

function onDashboardEvent(fn) { eventListeners.add(fn); return fn; }
function offDashboardEvent(fn) { eventListeners.delete(fn); }

function connectWs() {
  if (ws) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/dashboard/ws');

  ws.onopen = () => {
    if (wsStatus) wsStatus.className = 'ws-dot online';
    if (wsLabel) wsLabel.textContent = 'Connected';
  };

  ws.onclose = () => {
    if (wsStatus) wsStatus.className = 'ws-dot offline';
    if (wsLabel) wsLabel.textContent = 'Disconnected';
    ws = null;
    if (!dashboard.hidden) setTimeout(connectWs, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      for (const fn of eventListeners) fn(event);
    } catch { /* ignore */ }
  };
}

// ── Hub Renderer ───────────────────────────────────────────────────────
async function renderHub(app) {
  app.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const [overview, agents, consensus] = await Promise.all([
      api('overview'), api('agents'), api('consensus'),
    ]);
    app.innerHTML = '';

    // Build sections
    app.appendChild(renderOverviewSection(overview));

    const liveStrip = document.createElement('div');
    liveStrip.className = 'section live-strip';
    liveStrip.hidden = true;
    app.appendChild(liveStrip);
    renderTaskStrip(liveStrip);

    app.appendChild(renderTeamSection(agents));
    app.appendChild(renderActivitySection(consensus));
    app.appendChild(renderKnowledgeSection(agents));

    // Wire WS live updates — selective section refresh, debounced
    let refreshTimer = null;
    const pendingSections = new Set();

    const sectionMap = {
      task_dispatched:      ['activity'],
      task_completed:       ['overview', 'activity'],
      task_failed:          ['overview', 'activity'],
      consensus_started:    ['activity'],
      consensus_complete:   ['overview', 'activity'],
      agent_connected:      ['overview', 'team'],
      agent_disconnected:   ['overview', 'team'],
      skill_changed:        [],
    };

    const wsHandler = onDashboardEvent((event) => {
      if (event.type === 'task_dispatched' || event.type === 'task_completed' || event.type === 'task_failed') {
        const strip = app.querySelector('.live-strip');
        if (strip) renderTaskStrip(strip);
      }

      const sections = sectionMap[event.type];
      if (!sections || sections.length === 0) return;
      for (const s of sections) pendingSections.add(s);

      // Debounce: wait 500ms to batch rapid events
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(async () => {
        const toRefresh = new Set(pendingSections);
        pendingSections.clear();

        try {
          // Only fetch APIs needed for the sections being refreshed
          const needsOverview = toRefresh.has('overview');
          const needsAgents = toRefresh.has('team') || toRefresh.has('knowledge');
          const needsConsensus = toRefresh.has('activity');

          const [ov, ag, cx] = await Promise.all([
            needsOverview ? api('overview') : null,
            needsAgents ? api('agents') : null,
            needsConsensus ? api('consensus') : null,
          ]);

          // Replace only the affected section DOM nodes
          // sections: [0]=overview, [1]=team, [2]=activity, [3]=knowledge
          const sections = app.querySelectorAll('.section');
          if (ov && sections[0]) { const el = renderOverviewSection(ov); sections[0].replaceWith(el); }
          if (ag && sections[1]) { const el = renderTeamSection(ag); sections[1].replaceWith(el); }
          if (cx && sections[2]) { const el = renderActivitySection(cx); sections[2].replaceWith(el); }
          if (ag && sections[3]) { const el = renderKnowledgeSection(ag); sections[3].replaceWith(el); }
        } catch { /* best-effort live update */ }
      }, 500);
    });
    currentCleanup = () => { offDashboardEvent(wsHandler); if (refreshTimer) clearTimeout(refreshTimer); };

  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load dashboard: ' + escapeHtml(err.message) + '</div>';
  }
}

// ── Section Helper ─────────────────────────────────────────────────────
function makeSection(title, count, actionText, actionTarget) {

  const header = document.createElement('div');

  }

  section.appendChild(header);
  return section;
}

api('overview')

// Export for hub/detail modules

// packages/dashboard/src/lib/markdown.js — Simple markdown renderer (extracted from Phase 1)

function renderMarkdown(md) {
  const esc = window._dash.escapeHtml;

  // Extract code blocks BEFORE escaping
  const codeBlocks = [];
  let processed = md.replace(/```[\s\S]*?```/g, (m) => {
    const content = m.slice(3, -3).replace(/^[^\n]*\n/, '');
    const placeholder = '\x00CODE' + codeBlocks.length + '\x00';
    codeBlocks.push('<pre class="memory-code">' + esc(content) + '</pre>');
    return placeholder;
  });

  const inlineCodes = [];
  processed = processed.replace(/`([^`]+)`/g, (_, code) => {
    const placeholder = '\x00INLINE' + inlineCodes.length + '\x00';
    inlineCodes.push('<code>' + esc(code) + '</code>');
    return placeholder;
  });

  let html = esc(processed);

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links: safe schemes only, escape URL
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
    if (/^(https?:\/\/|knowledge\/|#)/.test(url)) return '<a href="' + esc(url) + '">' + text + '</a>';
    return text;
  });

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*(<(?:h[1-4]|ul|pre|li)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-4]|ul|pre|li)>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  // Restore placeholders
  codeBlocks.forEach((block, i) => { html = html.replace('\x00CODE' + i + '\x00', block); });
  inlineCodes.forEach((code, i) => { html = html.replace('\x00INLINE' + i + '\x00', code); });

  return html;
}

  return '
</body>

 + cost.toFixed(2);
}

function createExpansionManager() {
  let current = null;
  return {
    expand(row) {
      if (current && current !== row) {
        current.classList.remove('data-row--expanded');
        const oldPanel = current.nextElementSibling;
        if (oldPanel && oldPanel.classList.contains('data-expand')) {
          oldPanel.remove();
        }
      }
      current = row;
    },
    collapse() {
      if (current) {
        current.classList.remove('data-row--expanded');
        const panel = current.nextElementSibling;
        if (panel && panel.classList.contains('data-expand')) {
          panel.remove();
        }
        current = null;
      }
    },
    current() { return current; },
  };
}

function createDataView(options) {
  const {
    columns, defaultSort, defaultOrder = 'desc',
    onSort, onLoadMore, total = 0,
    gridTemplateColumns,
  } = options;

  const container = document.createElement('div');
  container.className = 'data-view';

  let sortKey = defaultSort;
  let sortDir = defaultOrder;

  // Header
  const header = document.createElement('div');
  header.className = 'data-header';
  header.style.gridTemplateColumns = gridTemplateColumns;

  columns.forEach(col => {
    const cell = document.createElement('div');
    cell.className = 'data-cell' + (col.align === 'right' ? ' data-cell--right' : col.align === 'center' ? ' data-cell--center' : '');

    if (col.sortable !== false) {
      cell.setAttribute('data-sort', col.key);
      const arrow = col.key === sortKey ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      cell.innerHTML = _dash.escapeHtml(col.label) + (arrow ? '<span class="data-sort data-sort--active">' + arrow + '</span>' : '');
      cell.addEventListener('click', () => {
        if (sortKey === col.key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortKey = col.key;
          sortDir = 'desc';
        }
        header.querySelectorAll('[data-sort]').forEach(c => {
          const k = c.getAttribute('data-sort');
          const isActive = k === sortKey;
          const arrowText = isActive ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
          const labelText = columns.find(cc => cc.key === k)?.label || '';
          c.innerHTML = _dash.escapeHtml(labelText) + (arrowText ? '<span class="data-sort data-sort--active">' + arrowText + '</span>' : '');
        });
        if (onSort) onSort(sortKey, sortDir);
      });
    } else {
      cell.textContent = col.label;
    }

    header.appendChild(cell);
  });

  container.appendChild(header);

  // Scrollable rows area
  const rows = document.createElement('div');
  rows.className = 'data-rows';
  container.appendChild(rows);

  // Load more
  const loadMoreDiv = document.createElement('div');
  loadMoreDiv.className = 'data-load-more';
  loadMoreDiv.style.display = 'none';
  const loadMoreBtn = document.createElement('button');
  loadMoreBtn.textContent = 'Load more';
  loadMoreBtn.addEventListener('click', async () => {
    loadMoreBtn.textContent = 'Loading...';
    loadMoreBtn.disabled = true;
    try {
      if (onLoadMore) await onLoadMore();
    } finally {
      loadMoreBtn.textContent = 'Load more';
      loadMoreBtn.disabled = false;
    }
  });
  loadMoreDiv.appendChild(loadMoreBtn);
  container.appendChild(loadMoreDiv);

  container._dataView = {
    rows,
    setLoadMoreVisible(visible) {
      loadMoreDiv.style.display = visible ? 'flex' : 'none';
    },
    clear() {
      rows.innerHTML = '';
    },
    getSortState() { return { key: sortKey, dir: sortDir }; },
  };

  return container;
}

function createDataRow(cells, onExpand, gridTemplateColumns) {
  const row = document.createElement('div');
  row.className = 'data-row';
  row.style.gridTemplateColumns = gridTemplateColumns;

  cells.forEach(cell => {
    const el = document.createElement('div');
    el.className = 'data-cell' + (cell.className ? ' ' + cell.className : '');
    if (typeof cell.content === 'string') {
      el.innerHTML = cell.content;
    } else if (cell.content instanceof HTMLElement) {
      el.appendChild(cell.content);
    }
    row.appendChild(el);
  });

  if (onExpand) {
    row.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      onExpand(row);
    });
  }

  return row;
}

function createDateGroup(label) {
  const el = document.createElement('div');
  el.className = 'data-group';
  el.textContent = label;
  return el;
}

function createEmptyState(message, onClear) {
  const el = document.createElement('div');
  el.className = 'data-empty';
  if (onClear) {
    el.innerHTML = _dash.escapeHtml(message) + ' <a>Clear filters</a>';
    el.querySelector('a').addEventListener('click', onClear);
  } else {
    el.textContent = message;
  }
  return el;
}

function createErrorState(onRetry) {
  const el = document.createElement('div');
  el.className = 'data-error';
  el.innerHTML = 'Failed to load' + (onRetry ? ' — <a>Retry</a>' : '');
  if (onRetry) el.querySelector('a').addEventListener('click', onRetry);
  return el;
}

window._dataRows = {
  createDataView,
  createDataRow,
  createDateGroup,
  createExpansionManager,
  createEmptyState,
  createErrorState,
  formatMetric,
  estimateCost,
};

  const sorted = [...agents].sort((a, b) =>
    (b.scores?.dispatchWeight || 0) - (a.scores?.dispatchWeight || 0)
  );

  const show = sorted.slice(0, 6);
  const rest = sorted.length - show.length;

  for (const agent of show) {
    const btn = document.createElement('button');
    btn.className = 'ag';
    btn.addEventListener('click', () => navigate('#/team/' + encodeURIComponent(agent.id)));

    const w = agent.scores?.dispatchWeight ?? 1;
    const signals = agent.scores?.signals ?? 0;
    const accuracy = agent.scores?.accuracy ?? 0.5;
    const reliability = agent.scores?.reliability ?? 0.5;
    const uniqueness = agent.scores?.uniqueness ?? 0.5;
    const ringColor = signals === 0 ? 'var(--text-3)'
      : w >= 1.5 ? 'var(--green)'
      : w >= 0.8 ? 'var(--amber)'
      : 'var(--red)';
    const ringOpacity = signals === 0 ? '0.35' : '1';
    const arcLength = 132 * Math.min(1, accuracy);

    const lastTask = agent.lastTask;
    const lastText = lastTask
      ? e((lastTask.task || '').replace(/\n.*/s, '').slice(0, 55))
      : 'idle';
    const lastTime = lastTask?.timestamp ? timeAgo(lastTask.timestamp) : '';

    btn.innerHTML =
      '<div class="ag-ring-wrap">' +
        '<svg class="ag-ring" viewBox="0 0 48 48" style="opacity:' + ringOpacity + '">' +
          '<circle cx="24" cy="24" r="21" fill="none" stroke="' + ringColor + '" stroke-width="3" opacity="0.2"/>' +
          '<circle cx="24" cy="24" r="21" fill="none" stroke="' + ringColor + '" stroke-width="3"' +
            ' stroke-dasharray="' + arcLength + ' 132"' +
            ' transform="rotate(-90 24 24)"/>' +
        '</svg>' +
        '<span class="ag-initials" style="color:' + ringColor + '">' + agentInitials(agent.id) + '</span>' +
      '</div>' +
      '<span class="ag-name">' + e(agent.id) + '</span>' +
      '<div class="ag-stats">' +
        '<div class="ag-stat"><span class="ag-stat-label">acc</span><div class="ag-stat-bar"><div class="ag-stat-fill" style="width:' + (accuracy * 100) + '%;background:' + ringColor + '"></div></div></div>' +
        '<div class="ag-stat"><span class="ag-stat-label">rel</span><div class="ag-stat-bar"><div class="ag-stat-fill" style="width:' + (reliability * 100) + '%;background:' + ringColor + '"></div></div></div>' +
        '<div class="ag-stat"><span class="ag-stat-label">uniq</span><div class="ag-stat-bar"><div class="ag-stat-fill" style="width:' + (uniqueness * 100) + '%;background:' + ringColor + '"></div></div></div>' +
      '</div>' +
      '<span class="ag-last">' + lastText +
        (lastTime ? ' <span class="ag-time">' + lastTime + '</span>' : '') +
      '</span>';

    grid.appendChild(btn);
  }

  if (rest > 0) {
    const more = document.createElement('button');
    more.className = 'ag ag-overflow';
    more.addEventListener('click', () => navigate('#/team'));
    more.innerHTML = '<span class="ag-more-count">+' + rest + '</span><span class="ag-more-label">more</span>';
    grid.appendChild(more);
  }

  section.appendChild(grid);
  return section;
}

// packages/dashboard/src/hub/activity.js — Consensus run timeline with expandable findings

function renderActivitySection(consensusData) {
  const { escapeHtml: e, navigate, makeSection, timeAgo, agentInitials } = window._dash;
  // Handle both old signature (3 args) and new (1 arg)
  if (arguments.length === 3) consensusData = arguments[1];

  const runs = consensusData.runs || [];
  const section = makeSection('Recent Runs', runs.length + ' runs', 'all signals →', '#/signals');

  const list = document.createElement('div');
  list.className = 'run-list';

  if (runs.length === 0) {
    list.innerHTML = '<div class="empty-state">No consensus runs yet. Dispatch agents with gossip_dispatch_consensus.</div>';
    section.appendChild(list);
    return section;
  }

  for (const run of runs.slice(0, 10)) {
    const card = document.createElement('div');
    card.className = 'run-card';

    const c = run.counts || {};
    const total = (c.agreement || 0) + (c.disagreement || 0) + (c.hallucination || 0) + (c.unverified || 0) + (c.unique || 0) + (c.new || 0);

    const pills = [];
    if (c.agreement) pills.push('<span class="pill pill-g pill-filter" data-filter="confirmed">' + c.agreement + ' confirmed</span>');
    if (c.disagreement || c.hallucination) pills.push('<span class="pill pill-r pill-filter" data-filter="disputed">' + ((c.disagreement || 0) + (c.hallucination || 0)) + ' disputed</span>');
    if (c.unverified) pills.push('<span class="pill pill-y pill-filter" data-filter="unverified">' + c.unverified + ' unverified</span>');
    if (c.unique) pills.push('<span class="pill pill-b pill-filter" data-filter="unique">' + c.unique + ' unique</span>');

    const segments = [];
    if (total > 0) {
      if (c.agreement) segments.push('<div class="bar-seg bar-seg-g" style="width:' + ((c.agreement / total) * 100) + '%"></div>');
      if (c.disagreement || c.hallucination) segments.push('<div class="bar-seg bar-seg-r" style="width:' + (((c.disagreement || 0) + (c.hallucination || 0)) / total * 100) + '%"></div>');
      if (c.unverified) segments.push('<div class="bar-seg bar-seg-y" style="width:' + ((c.unverified / total) * 100) + '%"></div>');
      if (c.unique) segments.push('<div class="bar-seg bar-seg-b" style="width:' + ((c.unique / total) * 100) + '%"></div>');
    }
    const barHtml = segments.length > 0 ? '<div class="run-bar">' + segments.join('') + '</div>' : '';

    const agentChips = run.agents.slice(0, 4).map(a =>
      '<span class="run-agent-chip">' + agentInitials(a) + '</span>'
    ).join('');
    const moreAgents = run.agents.length > 4 ? '<span class="run-agent-more">+' + (run.agents.length - 4) + '</span>' : '';

    const header = document.createElement('div');
    header.className = 'run-header';
    header.innerHTML =
      '<div class="run-top">' +
        '<span class="run-expand">&#8250;</span>' +
        '<span class="run-title">' + total + ' findings</span>' +
        '<span class="run-agents">' + agentChips + moreAgents + '</span>' +
        '<span class="run-time">' + timeAgo(run.timestamp) + '</span>' +
      '</div>' +
      '<div class="run-pills">' + pills.join('') + '</div>' +
      barHtml;

    const findings = document.createElement('div');
    findings.className = 'run-findings';
    findings.hidden = true;

    for (const sig of run.signals) {
      if (sig.signal === 'signal_retracted') continue;
      let tag = '', tagClass = '';
      if (sig.signal === 'agreement' || sig.signal === 'consensus_verified') { tag = 'CONFIRMED'; tagClass = 'tag-g'; }
      else if (sig.signal === 'disagreement' || sig.signal === 'hallucination_caught') { tag = 'DISPUTED'; tagClass = 'tag-r'; }
      else if (sig.signal === 'unverified') { tag = 'UNVERIFIED'; tagClass = 'tag-y'; }
      else if (sig.signal === 'unique_confirmed') { tag = 'UNIQUE'; tagClass = 'tag-u'; }
      else if (sig.signal === 'unique_unconfirmed') { tag = 'UNIQUE'; tagClass = 'tag-u'; }
      else if (sig.signal === 'new_finding') { tag = 'NEW'; tagClass = 'tag-b'; }
      else continue;

      const evidence = e((sig.evidence || '').slice(0, 200));
      const attribution = sig.counterpartId
        ? e(sig.agentId) + ' & ' + e(sig.counterpartId)
        : e(sig.agentId);

      const row = document.createElement('div');
      row.className = 'finding-row';
      row.innerHTML =
        '<span class="finding-tag ' + tagClass + '">' + tag + '</span>' +
        '<div class="finding-body">' +
          '<div class="finding-text">' + evidence + '</div>' +
          '<div class="finding-attr">' + attribution + '</div>' +
        '</div>';
      findings.appendChild(row);
    }

    header.addEventListener('click', (evt) => {
      // If clicking a filter pill, filter findings instead of toggling
      const filterPill = evt.target.closest('.pill-filter');
      if (filterPill) {
        evt.stopPropagation();
        const filterType = filterPill.dataset.filter;
        // Ensure findings are visible
        findings.hidden = false;
        header.querySelector('.run-expand').innerHTML = '&#8964;';
        card.classList.add('run-open');
        // Toggle: if same filter clicked again, show all
        const isActive = filterPill.classList.contains('pill-active');
        card.querySelectorAll('.pill-filter').forEach(p => p.classList.remove('pill-active'));
        if (isActive) {
          // Show all
          findings.querySelectorAll('.finding-row').forEach(r => { r.hidden = false; });
        } else {
          filterPill.classList.add('pill-active');
          findings.querySelectorAll('.finding-row').forEach(r => {
            const tag = r.querySelector('.finding-tag');
            if (!tag) { r.hidden = true; return; }
            const tagText = tag.textContent.toLowerCase();
            r.hidden = !tagText.includes(filterType);
          });
        }
        return;
      }
      const isOpen = !findings.hidden;
      findings.hidden = isOpen;
      header.querySelector('.run-expand').innerHTML = isOpen ? '&#8250;' : '&#8964;';
      card.classList.toggle('run-open', !isOpen);
    });

    card.appendChild(header);
    card.appendChild(findings);
    list.appendChild(card);
  }

  section.appendChild(list);
  return section;
}

// packages/dashboard/src/detail/agent.js — Agent grid view (#/team and #/team/:id)

const AGENT_GRID = '48px 1fr 100px 90px 90px 90px 80px 100px';

// renderAgentDetail handles both #/team (agentId undefined) and #/team/:id
async function renderAgentDetail(app, agentId) {
  const { api, escapeHtml: e, agentInitials, formatTokens, makeSection, navigate } = window._dash;
  const { createDataView, createDataRow, createExpansionManager,
          createEmptyState, createErrorState, formatMetric } = window._dataRows;

  app.innerHTML = '<div class="loading">Loading agents...</div>';

  let agents;
  try {
    agents = await api('agents');
  } catch (err) {
    app.innerHTML = '';
    const section = makeSection('Team', '');
    section.appendChild(createErrorState(() => renderAgentDetail(app, agentId)));
    app.appendChild(section);
    return;
  }

  if (!agents || agents.length === 0) {
    app.innerHTML = '';
    const section = makeSection('Team', '0 agents');
    section.appendChild(createEmptyState('No agents configured.', null));
    app.appendChild(section);
    return;
  }

  // If #/team/:id and agent not found, show error
  if (agentId && !agents.find(a => a.id === agentId)) {
    app.innerHTML = '<div class="empty-state">Agent not found: ' + e(agentId) + '</div>';
    return;
  }

  app.innerHTML = '';
  const section = makeSection('Team', agents.length + ' agents');

  // Sort state
  let sortKey = 'weight';
  let sortDir = 'desc';

  const columns = [
    { key: 'ring',        label: '',            sortable: false },
    { key: 'name',        label: 'Agent',       sortable: false },
    { key: 'weight',      label: 'Weight',      sortable: true,  align: 'right' },
    { key: 'accuracy',    label: 'Accuracy',    sortable: true,  align: 'right' },
    { key: 'reliability', label: 'Reliability', sortable: true,  align: 'right' },
    { key: 'unique',      label: 'Unique',      sortable: true,  align: 'right' },
    { key: 'signals',     label: 'Signals',     sortable: true,  align: 'right' },
    { key: 'tokens',      label: 'Tokens',      sortable: true,  align: 'right' },
  ];

  const expansion = createExpansionManager();

  const dataView = createDataView({
    columns,
    gridTemplateColumns: AGENT_GRID,
    defaultSort: 'weight',
    defaultOrder: 'desc',
    onSort: (key, dir) => {
      sortKey = key;
      sortDir = dir;
      renderRows();
    },
  });

  section.appendChild(dataView);
  app.appendChild(section);

  // Track row elements by agent id for auto-scroll
  const rowMap = {};

  function getSorted() {
    const copy = [...agents];
    copy.sort((a, b) => {
      const s1 = a.scores || {};
      const s2 = b.scores || {};
      let v1, v2;
      if (sortKey === 'weight')      { v1 = s1.dispatchWeight ?? 0; v2 = s2.dispatchWeight ?? 0; }
      else if (sortKey === 'accuracy')    { v1 = s1.accuracy ?? 0;       v2 = s2.accuracy ?? 0; }
      else if (sortKey === 'reliability') { v1 = s1.reliability ?? 0;    v2 = s2.reliability ?? 0; }
      else if (sortKey === 'unique')      { v1 = s1.uniqueness ?? 0;     v2 = s2.uniqueness ?? 0; }
      else if (sortKey === 'signals')     { v1 = s1.signals ?? 0;        v2 = s2.signals ?? 0; }
      else if (sortKey === 'tokens')      { v1 = a.totalTokens ?? 0;     v2 = b.totalTokens ?? 0; }
      else { v1 = 0; v2 = 0; }
      return sortDir === 'asc' ? v1 - v2 : v2 - v1;
    });
    return copy;
  }

  function makeRingCell(agent) {
    const s = agent.scores || {};
    const w = s.dispatchWeight ?? 1;
    const signals = s.signals ?? 0;
    const accuracy = s.accuracy ?? 0.5;
    const ringColor = signals === 0 ? 'var(--text-3)'
      : w >= 1.5 ? 'var(--green)'
      : w >= 0.8 ? 'var(--amber)'
      : 'var(--red)';
    const ringOpacity = signals === 0 ? '0.35' : '1';
    const arcLength = 132 * Math.min(1, accuracy);
    const initials = agentInitials(agent.id);

    return (
      '<div style="position:relative;width:32px;height:32px;flex-shrink:0">' +
        '<svg viewBox="0 0 48 48" style="width:32px;height:32px;opacity:' + ringOpacity + '">' +
          '<circle cx="24" cy="24" r="21" fill="none" stroke="' + ringColor + '" stroke-width="3" opacity="0.2"/>' +
          '<circle cx="24" cy="24" r="21" fill="none" stroke="' + ringColor + '" stroke-width="3"' +
            ' stroke-dasharray="' + arcLength + ' 132" transform="rotate(-90 24 24)"/>' +
        '</svg>' +
        '<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;' +
          'font-size:10px;font-weight:700;font-family:var(--mono);color:' + ringColor + '">' +
          e(initials) +
        '</span>' +
      '</div>'
    );
  }

  function makeWeightCell(agent) {
    const w = (agent.scores || {}).dispatchWeight ?? 1;
    const barWidth = Math.round(Math.min(w / 2.5, 1) * 60);
    return (
      '<div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">' +
        '<span class="data-bar" style="width:' + barWidth + 'px"></span>' +
        '<span style="font-family:var(--mono);font-size:12px">' + w.toFixed(2) + '</span>' +
      '</div>'
    );
  }

  function makeExpandPanel(agent, gridCols) {
    const s = agent.scores || {};
    const expand = document.createElement('div');
    expand.className = 'data-expand';

    // Skills block
    const slots = agent.skillSlots || [];
    if (slots.length > 0) {
      const skillBlock = document.createElement('div');
      skillBlock.className = 'expand-block';

      let pillsHtml = '<div class="expand-label">Skills</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">';

      pillsHtml += '</div>';

      skillBlock.innerHTML = pillsHtml;
      expand.appendChild(skillBlock);
    }

    // Signal breakdown stacked bar
    const agreements = s.agreements ?? 0;
    const hallucinations = s.hallucinations ?? 0;
    const disagreements = s.disagreements ?? 0;
    const signals = s.signals ?? 0;
    const other = Math.max(0, signals - agreements - hallucinations - disagreements);

    if (signals > 0) {
      const sigBlock = document.createElement('div');
      sigBlock.className = 'expand-block';

      const pct = (n) => (n / signals * 100).toFixed(1) + '%';
      sigBlock.innerHTML =
        '<div class="expand-label">Signal Breakdown</div>' +
        '<div class="run-bar" style="height:8px;margin-top:6px">' +
          (agreements   > 0 ? '<div class="bar-seg bar-seg-g" style="flex:' + agreements   + '" title="Agreements: ' + agreements + '"></div>' : '') +
          (hallucinations > 0 ? '<div class="bar-seg bar-seg-r" style="flex:' + hallucinations + '" title="Hallucinations: ' + hallucinations + '"></div>' : '') +
          (disagreements > 0 ? '<div class="bar-seg bar-seg-y" style="flex:' + disagreements + '" title="Disagreements: ' + disagreements + '"></div>' : '') +
          (other         > 0 ? '<div class="bar-seg bar-seg-b" style="flex:' + other         + '" title="Other: ' + other + '"></div>' : '') +
        '</div>' +
        '<div class="expand-meta" style="margin-top:6px;font-size:11px;color:var(--text-3);font-family:var(--mono);display:flex;gap:12px">' +
          (agreements   > 0 ? '<span style="color:var(--green)">' + agreements + ' agree (' + pct(agreements) + ')</span>' : '') +
          (hallucinations > 0 ? '<span style="color:var(--red)">' + hallucinations + ' halluc. (' + pct(hallucinations) + ')</span>' : '') +
          (disagreements > 0 ? '<span style="color:var(--amber)">' + disagreements + ' disagree (' + pct(disagreements) + ')</span>' : '') +
        '</div>';
      expand.appendChild(sigBlock);
    }

    // Provider info
    const infoBlock = document.createElement('div');
    infoBlock.className = 'expand-block expand-meta-row';
    let infoHtml = '';
    if (agent.provider) {
      infoHtml += '<span class="expand-id">Provider: ' + e(agent.provider) + '</span>';
    }
    if (agent.model) {
      infoHtml += ' <span class="expand-id">Model: ' + e(agent.model) + '</span>';
    }
    if (agent.preset) {
      infoHtml += ' <span class="expand-id">Preset: ' + e(agent.preset) + '</span>';
    }
    infoHtml += ' <a href="#/knowledge/' + encodeURIComponent(agent.id) + '" class="expand-link">View memory</a>';
    infoBlock.innerHTML = infoHtml;
    expand.appendChild(infoBlock);

    return expand;
  }

  function renderRows() {
    const rows = dataView._dataView;
    rows.clear();
    rows.setLoadMoreVisible(false);

    const sorted = getSorted();

    if (sorted.length === 0) {
      rows.rows.appendChild(createEmptyState('No agents configured.', null));
      return;
    }

    for (const agent of sorted) {
      const s = agent.scores || {};
      const w = s.dispatchWeight ?? 1;
      const accuracy = s.accuracy ?? 0;
      const reliability = s.reliability ?? 0;
      const uniqueness = s.uniqueness ?? 0;
      const signals = s.signals ?? 0;
      const tokens = agent.totalTokens ?? 0;

      const cells = [
        { content: makeRingCell(agent), className: 'data-cell--center' },
        {
          content:
            '<div style="line-height:1.3">' +
            '<div style="font-weight:600;color:var(--text)">' + e(agent.id) + '</div>' +
            '<div style="font-size:11px;color:var(--text-3);font-family:var(--mono)">' +
              e(agent.provider || '') +
              (agent.model ? ' / ' + e(agent.model) : '') +
            '</div>' +
            '</div>',
        },
        { content: makeWeightCell(agent), className: 'data-cell--right' },
        { content: Math.round(accuracy * 100) + '%',    className: 'data-cell--right data-cell--mono' },
        { content: Math.round(reliability * 100) + '%', className: 'data-cell--right data-cell--mono' },
        { content: Math.round(uniqueness * 100) + '%',  className: 'data-cell--right data-cell--mono' },
        { content: String(signals),                      className: 'data-cell--right data-cell--mono' },
        { content: formatMetric(tokens),                 className: 'data-cell--right data-cell--mono' },
      ];

      const row = createDataRow(cells, (rowEl) => {
        const isExpanded = rowEl.classList.contains('data-row--expanded');

        expansion.expand(rowEl);

        if (isExpanded) {
          rowEl.classList.remove('data-row--expanded');
          const panel = rowEl.nextElementSibling;
          if (panel && panel.classList.contains('data-expand')) panel.remove();
          return;
        }

        rowEl.classList.add('data-row--expanded');
        const expand = makeExpandPanel(agent, AGENT_GRID);
        rowEl.insertAdjacentElement('afterend', expand);
      }, AGENT_GRID);

      rowMap[agent.id] = row;
      rows.rows.appendChild(row);
    }

    // Auto-scroll and expand when agentId param is set
    if (agentId && rowMap[agentId]) {
      const targetRow = rowMap[agentId];
      requestAnimationFrame(() => {
        targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (!targetRow.classList.contains('data-row--expanded')) {
          targetRow.click();
        }
      });
    }
  }

  renderRows();
}

// packages/dashboard/src/detail/tasks.js — Full task list with grid layout, filters, search, pagination

const TASKS_GRID = '32px 120px 1fr 80px 80px 70px 80px';
const TASKS_PAGE_SIZE = 50;

function inferProvider(agentId) {
  return (agentId || '').toLowerCase().includes('gemini') ? 'google' : 'anthropic';
}

function formatDuration(ms) {
  if (!ms || ms <= 0) return '—';
  const s = ms / 1000;
  if (s < 60) return s.toFixed(1) + 's';
  return Math.floor(s / 60) + 'm' + Math.round(s % 60) + 's';
}

function statusDot(status) {
  const color = status === 'completed' ? 'var(--green)'
    : status === 'failed' ? 'var(--red)'
    : status === 'cancelled' ? 'var(--amber)'
    : status === 'running' ? 'var(--accent)'
    : 'var(--text-3)';
  return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>';
}

function dateGroupLabel(ts) {
  if (!ts) return null;
  const d = new Date(ts);
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterdayStart = new Date(todayStart.getTime() - 86400000);
  if (d >= todayStart) return 'Today';
  if (d >= yesterdayStart) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
}

async function renderTasksDetail(app) {
  const { api, escapeHtml: e, timeAgo, makeSection } = window._dash;
  const { createDataView, createDataRow, createDateGroup, createExpansionManager,
          createEmptyState, createErrorState, formatMetric, estimateCost } = window._dataRows;

  app.innerHTML = '<div class="loading">Loading tasks...</div>';

  let allItems = [];
  let total = 0;
  let offset = 0;
  let activeFilter = 'all';
  let searchQuery = '';

  async function loadPage(pageOffset) {
    const data = await api('tasks?limit=' + TASKS_PAGE_SIZE + '&offset=' + pageOffset);
    const items = data.items || data.tasks || [];
    total = data.total || items.length;
    return items;
  }

  try {
    const firstPage = await loadPage(0);
    allItems = firstPage;
    offset = firstPage.length;
  } catch (err) {
    app.innerHTML = '';
    const section = makeSection('Tasks', '');
    section.appendChild(createErrorState(() => renderTasksDetail(app)));
    app.appendChild(section);
    return;
  }

  app.innerHTML = '';
  const section = makeSection('Tasks', total + ' total');

  // Filter pills
  const filtersEl = document.createElement('div');
  filtersEl.className = 'filters';
  const filterLabels = ['All', 'Running', 'Completed', 'Failed', 'Cancelled'];
  const filterValues = ['all', 'running', 'completed', 'failed', 'cancelled'];

  for (let i = 0; i < filterValues.length; i++) {
    const val = filterValues[i];
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (val === 'all' ? ' active' : '');
    btn.textContent = filterLabels[i];
    btn.addEventListener('click', () => {
      activeFilter = val;
      filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRows();
    });
    filtersEl.appendChild(btn);
  }
  section.appendChild(filtersEl);

  // Search input
  const searchEl = document.createElement('input');
  searchEl.className = 'search-input';
  searchEl.placeholder = 'Search by agent or task description...';
  searchEl.addEventListener('input', () => {
    searchQuery = searchEl.value.toLowerCase().trim();
    renderRows();
  });
  section.appendChild(searchEl);

  // Search scope indicator
  const scopeEl = document.createElement('div');
  scopeEl.style.cssText = 'font-size:11px;color:var(--text-3);margin-bottom:6px;min-height:16px';
  section.appendChild(scopeEl);

  // Data view
  const columns = [
    { key: 'status', label: '', sortable: false },
    { key: 'agent', label: 'Agent', sortable: false },
    { key: 'task', label: 'Task', sortable: false },
    { key: 'duration', label: 'Duration', sortable: false, align: 'right' },
    { key: 'tokens', label: 'Tokens', sortable: false, align: 'right' },
    { key: 'cost', label: 'Cost', sortable: false, align: 'right' },
    { key: 'time', label: 'Time', sortable: false, align: 'right' },
  ];

  const expansion = createExpansionManager();

  const dataView = createDataView({
    columns,
    gridTemplateColumns: TASKS_GRID,
    onLoadMore: async () => {
      const nextPage = await loadPage(offset);
      allItems = allItems.concat(nextPage);
      offset += nextPage.length;
      renderRows();
    },
  });

  section.appendChild(dataView);

  function getFiltered() {
    return allItems.filter(t => {
      if (activeFilter !== 'all' && t.status !== activeFilter) return false;
      if (searchQuery) {
        const agentMatch = (t.agentId || '').toLowerCase().includes(searchQuery);
        const taskMatch = (t.task || '').toLowerCase().includes(searchQuery);
        if (!agentMatch && !taskMatch) return false;
      }
      return true;
    });
  }

  function renderRows() {
    const rows = dataView._dataView;
    rows.clear();

    const filtered = getFiltered();

    // Search scope indicator
    if (searchQuery && offset < total) {
      scopeEl.textContent = '(searching ' + allItems.length + ' loaded of ' + total + ' total)';
    } else {
      scopeEl.textContent = '';
    }

    // Load-more visibility
    rows.setLoadMoreVisible(offset < total);

    if (filtered.length === 0) {
      rows.rows.appendChild(
        createEmptyState(
          searchQuery || activeFilter !== 'all' ? 'No matching tasks' : 'No tasks yet',
          (searchQuery || activeFilter !== 'all') ? () => {
            searchEl.value = '';
            searchQuery = '';
            activeFilter = 'all';
            filtersEl.querySelectorAll('.filter-btn').forEach((b, i) => {
              b.classList.toggle('active', i === 0);
            });
            renderRows();
          } : null
        )
      );
      return;
    }

    // Date group separators
    let lastGroupLabel = null;
    let lastTimestamp = null;

    for (const t of filtered) {
      const ts = t.timestamp || t.startedAt || null;

      // Insert date group if gap > 1 hour or label changed
      if (ts) {
        const label = dateGroupLabel(ts);
        const gap = lastTimestamp ? (new Date(lastTimestamp).getTime() - new Date(ts).getTime()) : Infinity;
        if (label !== lastGroupLabel || gap > 3600000) {
          if (label) {
            rows.rows.appendChild(createDateGroup(label));
            lastGroupLabel = label;
          }
        }
        lastTimestamp = ts;
      }

      const provider = inferProvider(t.agentId);
      const cost = estimateCost(provider, t.inputTokens, t.outputTokens);
      const totalTokens = (t.inputTokens || 0) + (t.outputTokens || 0);
      const tokensStr = totalTokens > 0 ? formatMetric(totalTokens) : '—';
      const dur = formatDuration(t.duration);
      const timeStr = ts ? timeAgo(ts) : '—';
      const firstLine = (t.task || '').replace(/\n[\s\S]*/m, '').slice(0, 100);

      const cells = [
        { content: statusDot(t.status), className: 'data-cell--center' },
        { content: e(t.agentId || ''), className: 'data-cell--mono' },
        { content: e(firstLine) },
        { content: dur, className: 'data-cell--right data-cell--mono' },
        { content: tokensStr, className: 'data-cell--right data-cell--mono' },
        { content: cost, className: 'data-cell--right data-cell--mono' },
        { content: timeStr, className: 'data-cell--right' },
      ];

      const row = createDataRow(cells, (rowEl) => {
        const isExpanded = rowEl.classList.contains('data-row--expanded');

        // Collapse any previously expanded row
        expansion.expand(rowEl);

        if (isExpanded) {
          rowEl.classList.remove('data-row--expanded');
          const panel = rowEl.nextElementSibling;
          if (panel && panel.classList.contains('data-expand')) panel.remove();
          return;
        }

        rowEl.classList.add('data-row--expanded');

        // Build expansion panel
        const expand = document.createElement('div');
        expand.className = 'data-expand';

        // Full task text
        if (t.task) {
          const taskBlock = document.createElement('div');
          taskBlock.className = 'expand-block';
          taskBlock.innerHTML =
            '<div class="expand-label">Task</div>' +
            '<pre class="expand-pre">' + e(t.task) + '</pre>';
          expand.appendChild(taskBlock);
        }

        // Result
        if (t.result) {
          const resultBlock = document.createElement('div');
          resultBlock.className = 'expand-block';
          resultBlock.innerHTML =
            '<div class="expand-label">Result</div>' +
            '<pre class="expand-pre">' + e(t.result) + '</pre>';
          expand.appendChild(resultBlock);
        }

        // Token breakdown
        if (t.inputTokens || t.outputTokens) {
          const tokenBlock = document.createElement('div');
          tokenBlock.className = 'expand-block';
          tokenBlock.innerHTML =
            '<div class="expand-label">Tokens</div>' +
            '<div class="expand-meta">' +
              'Input: <strong>' + formatMetric(t.inputTokens || 0) + '</strong>' +
              ' &nbsp; Output: <strong>' + formatMetric(t.outputTokens || 0) + '</strong>' +
              ' &nbsp; Cost: <strong>' + cost + '</strong>' +
            '</div>';
          expand.appendChild(tokenBlock);
        }

        // Task ID + consensus link
        const metaBlock = document.createElement('div');
        metaBlock.className = 'expand-block expand-meta-row';
        let metaHtml = '';
        if (t.taskId) {
          metaHtml += '<span class="expand-id">ID: ' + e(t.taskId) + '</span>';
        }
        if (t.consensusId || t.taskId) {
          const cId = t.consensusId || t.taskId;
          metaHtml += ' <a href="#/consensus/' + encodeURIComponent(cId) + '" class="expand-link">View consensus</a>';
        }
        if (metaHtml) {
          metaBlock.innerHTML = metaHtml;
          expand.appendChild(metaBlock);
        }

        rowEl.insertAdjacentElement('afterend', expand);
      }, TASKS_GRID);

      if (t.status === 'running') {
        row.classList.add('data-row--running');
      }

      rows.rows.appendChild(row);
    }
  }

  renderRows();
  app.appendChild(section);
}

// packages/dashboard/src/detail/consensus.js — Single consensus run detail

const CONSENSUS_GRID = '110px 1fr 140px 140px';

function consensusTagClass(signal) {
  const s = signal || '';
  if (s === 'agreement' || s === 'unique_confirmed') return 'tag-g';
  if (s === 'disagreement' || s === 'hallucination_caught') return 'tag-r';
  if (s === 'unique_unconfirmed') return 'tag-u';
  if (s === 'unverified') return 'tag-y';
  return 'tag-b';
}

function consensusTagLabel(signal) {
  const labels = {
    agreement:           'CONFIRMED',
    unique_confirmed:    'CONFIRMED',
    disagreement:        'DISPUTED',
    hallucination_caught:'DISPUTED',
    unverified:          'UNVERIFIED',
    unique_unconfirmed:  'UNIQUE',
    new_finding:         'NEW',
  };
  return labels[signal] || (signal || '').replace(/_/g, ' ').toUpperCase();
}

function consensusDisplayCategory(signal) {
  const s = signal || '';
  if (s === 'agreement' || s === 'unique_confirmed') return 'CONFIRMED';
  if (s === 'disagreement' || s === 'hallucination_caught') return 'DISPUTED';
  if (s === 'unverified') return 'UNVERIFIED';
  if (s === 'unique_unconfirmed') return 'UNIQUE';
  if (s === 'new_finding') return 'NEW';
  return 'OTHER';
}

async function renderConsensusDetail(app, taskId) {
  const { api, escapeHtml: e, makeSection } = window._dash;
  const { createDataView, createDataRow, createExpansionManager,
          createEmptyState, createErrorState } = window._dataRows;

  app.innerHTML = '<div class="loading">Loading consensus run...</div>';

  let run;
  try {
    const data = await api('consensus');
    run = (data.runs || []).find(r => r.taskId === taskId);
  } catch (err) {
    app.innerHTML = '';
    const section = makeSection('Consensus Run', '');
    section.appendChild(createErrorState(() => renderConsensusDetail(app, taskId)));
    app.appendChild(section);
    return;
  }

  if (!run) {
    app.innerHTML = '<div class="empty-state">Consensus run not found: ' + e(taskId) + '</div>';
    return;
  }

  app.innerHTML = '';
  const agentCount = (run.agents || []).length;
  const section = makeSection('Consensus Run', agentCount + ' agents');

  // ── Summary pills ──────────────────────────────────────────────────────
  const c = run.counts || {};

  // Tally from signals to compute per-category counts matching the display categories
  const signals = run.signals || [];
  const tally = { CONFIRMED: 0, DISPUTED: 0, UNVERIFIED: 0, UNIQUE: 0, NEW: 0 };
  for (const s of signals) {
    const cat = consensusDisplayCategory(s.signal);
    if (tally[cat] != null) tally[cat]++;
  }

  const pillDefs = [
    { label: 'Confirmed',  value: tally.CONFIRMED,  cls: 'pill-g' },
    { label: 'Disputed',   value: tally.DISPUTED,   cls: 'pill-r' },
    { label: 'Unverified', value: tally.UNVERIFIED, cls: 'pill-y' },
    { label: 'Unique',     value: tally.UNIQUE,     cls: 'pill-u' },
    { label: 'New',        value: tally.NEW,        cls: 'pill-b' },
  ];

  const pills = document.createElement('div');
  pills.style.cssText = 'display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap';
  for (const p of pillDefs) {
    if (!p.value) continue;
    const pill = document.createElement('span');
    pill.className = 'pill ' + p.cls;
    pill.textContent = p.value + ' ' + p.label;
    pills.appendChild(pill);
  }
  section.appendChild(pills);

  // ── Data grid ──────────────────────────────────────────────────────────
  const columns = [
    { key: 'tag',       label: 'Tag',        sortable: false },
    { key: 'finding',   label: 'Finding',    sortable: false },
    { key: 'foundBy',   label: 'Found By',   sortable: false },
    { key: 'verifiedBy',label: 'Verified By',sortable: false },
  ];

  const expansion = createExpansionManager();

  const dataView = createDataView({
    columns,
    gridTemplateColumns: CONSENSUS_GRID,
  });

  section.appendChild(dataView);

  if (signals.length === 0) {
    dataView._dataView.rows.appendChild(createEmptyState('No signals recorded for this run'));
  } else {
    for (const s of signals) {
      const tc = consensusTagClass(s.signal);
      const typeLabel = consensusTagLabel(s.signal);
      const category = consensusDisplayCategory(s.signal);
      const evidenceSnippet = e((s.evidence || s.finding || '').slice(0, 140));
      const foundBy = e(s.agentId || '—');
      const verifiedBy = e(s.counterpartId || '—');

      const cells = [
        { content: '<span class="finding-tag ' + tc + '">' + e(typeLabel) + '</span>' },
        { content: evidenceSnippet },
        { content: foundBy, className: 'data-cell--mono' },
        { content: verifiedBy, className: 'data-cell--mono' },
      ];

      const row = createDataRow(cells, (rowEl) => {
        const isExpanded = rowEl.classList.contains('data-row--expanded');

        expansion.expand(rowEl);

        if (isExpanded) {
          rowEl.classList.remove('data-row--expanded');
          const panel = rowEl.nextElementSibling;
          if (panel && panel.classList.contains('data-expand')) panel.remove();
          return;
        }

        rowEl.classList.add('data-row--expanded');

        const expand = document.createElement('div');
        expand.className = 'data-expand';

        if (category === 'DISPUTED') {
          // Two-column side-by-side: claim vs counterargument
          const twoCol = document.createElement('div');
          twoCol.className = 'two-col';

          const leftBlock = document.createElement('div');
          leftBlock.innerHTML =
            '<div style="font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:6px">Claim (' + e(s.agentId || '') + ')</div>' +
            '<pre style="font-size:12px;color:var(--text-2);white-space:pre-wrap;margin:0">' + e(s.evidence || s.finding || '') + '</pre>';

          const counter = s.reason || s.counterEvidence || 'No counterargument recorded';
          const rightBlock = document.createElement('div');
          rightBlock.innerHTML =
            '<div style="font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:6px">Counter (' + e(s.counterpartId || '') + ')</div>' +
            '<pre style="font-size:12px;color:var(--text-2);white-space:pre-wrap;margin:0">' + e(counter) + '</pre>';

          twoCol.appendChild(leftBlock);
          twoCol.appendChild(rightBlock);
          expand.appendChild(twoCol);

        } else if (category === 'UNVERIFIED') {
          const block = document.createElement('div');
          block.innerHTML =
            '<pre style="font-size:12px;color:var(--text-2);white-space:pre-wrap;margin:0 0 8px">' + e(s.evidence || s.finding || '') + '</pre>' +
            '<div style="font-size:11px;color:var(--text-3);font-style:italic">Not verified by peers</div>';
          expand.appendChild(block);

        } else if (category === 'CONFIRMED') {
          const block = document.createElement('div');
          block.innerHTML =
            '<pre style="font-size:12px;color:var(--text-2);white-space:pre-wrap;margin:0 0 8px">' + e(s.evidence || s.finding || '') + '</pre>' +
            '<div style="font-size:11px;color:var(--text-3)">Confirmed by: ' + e(s.counterpartId || '—') + '</div>';
          expand.appendChild(block);

        } else {
          // NEW, UNIQUE, or OTHER — show full evidence
          const evidenceFull = s.evidence || s.finding || '';
          if (evidenceFull) {
            const block = document.createElement('div');
            block.innerHTML =
              '<pre style="font-size:12px;color:var(--text-2);white-space:pre-wrap;margin:0">' + e(evidenceFull) + '</pre>';
            expand.appendChild(block);
          }
        }

        rowEl.insertAdjacentElement('afterend', expand);
      }, CONSENSUS_GRID);

      dataView._dataView.rows.appendChild(row);
    }
  }

  app.appendChild(section);
}

async function renderSignalsDetail(app) {
