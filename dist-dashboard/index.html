<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gossipcat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════════════
   GOSSIPCAT DASHBOARD — Design System v2
   ═══════════════════════════════════════════════════ */

:root {
  --bg: #08090e;
  --surface: #0e1017;
  --surface-raised: #131620;
  --surface-hover: #181c28;
  --border: rgba(255,255,255,0.05);
  --border-active: rgba(167,139,250,0.25);
  --text: #e4e6ef;
  --text-2: #a0a4b8;
  --text-3: #7c8099;
  --accent: #a78bfa;
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.12);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-glow: rgba(251,191,36,0.1);
  --blue: #60a5fa;
  --blue-glow: rgba(96,165,250,0.1);
  --body: 'Outfit', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
[hidden] { display: none !important; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
  isolation: isolate;
}

/* ── Atmosphere ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -2;
  background:
    radial-gradient(ellipse 60% 45% at 20% -8%, rgba(167,139,250,0.04) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 85% 105%, rgba(52,211,153,0.02) 0%, transparent 55%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.012;
}

/* ── Scrollbar ──────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }

/* ── Accessibility ──────────────────────────────── */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── Auth Gate ──────────────────────────────────── */
.auth-gate {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  max-width: 380px; width: 100%;
}
.auth-card h1 { color: var(--accent); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
.auth-subtitle { color: var(--text-3); margin-bottom: 1.5rem; font-size: 0.875rem; }
.auth-card input {
  width: 100%; padding: 0.75rem 1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 0.875rem; font-family: var(--mono);
  margin-bottom: 1rem; outline: none;
}
.auth-card input:focus { border-color: var(--accent); }
.auth-card button {
  width: 100%; padding: 0.75rem;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 8px;
  font-weight: 600; font-size: 0.875rem; cursor: pointer;
  transition: opacity 0.15s;
}
.auth-card button:hover { opacity: 0.9; }
.auth-error { color: var(--red); font-size: 0.8rem; margin-top: 0.75rem; }

/* ── Topbar ─────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 50px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.logo {
  font-size: 16px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.02em; text-decoration: none;
}
.logo:hover { opacity: 0.9; }
.sep { color: var(--text-3); font-size: 12px; }
.crumb { color: var(--text-2); font-size: 13px; font-weight: 500; }
.nav-right { display: flex; align-items: center; gap: 14px; }
.ws-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3);
  background: var(--surface-raised); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 7px;
}
.ws-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.ws-dot.online {
  background: var(--green);
  box-shadow: 0 0 8px rgba(52,211,153,0.5);
  animation: glow 2.5s ease-in-out infinite;
}
.ws-dot.offline { background: var(--red); }

@keyframes glow {
  0%, 100% { box-shadow: 0 0 4px rgba(52,211,153,0.3); }
  50% { box-shadow: 0 0 10px rgba(52,211,153,0.6); }
}

/* ── Main Content ───────────────────────────────── */
.page {
  max-width: 1200px; margin: 0 auto;
  padding: 24px 32px;
  height: calc(100vh - 50px); overflow-y: auto;
}

/* ── Section Headers ────────────────────────────── */
.section { margin-bottom: 28px; }
.sh {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.sh-left { display: flex; align-items: center; gap: 10px; }
.sh-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
.sh-count {
  font-size: 10px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); background: var(--surface-raised);
  padding: 2px 8px; border-radius: 4px;
}
.sh-action {
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); cursor: pointer;
  transition: color 0.15s; letter-spacing: 0.02em;
  background: none; border: none;
}
.sh-action:hover { color: var(--accent); }

/* ── Status Bar ────────────────────────────────── */
.status-bar { padding: 14px 20px !important; margin-bottom: 16px; }
.status-bar .sh { display: none; }
.status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.sb-left, .sb-right { display: flex; align-items: center; gap: 10px; }
.sb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
.sb-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
.sb-stat { color: var(--text-2); font-size: 13px; font-family: var(--mono); }
.sb-sep { color: var(--text-3); }
.sb-action { color: var(--amber); font-size: 13px; font-weight: 600; font-family: var(--mono); }
.sb-clear { color: var(--green); font-size: 13px; font-family: var(--mono); }

/* ── Agent Cards ────────────────────────────────── */
.agent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.ag {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s; position: relative;
  color: var(--text);
}
.ag:hover {
  border-color: var(--border-active); background: var(--surface-raised);
  transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.ag.idle { opacity: 0.35; }
.ag.idle:hover { opacity: 0.5; }
.ag::before {
  content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
  border-radius: 0 2px 2px 0; background: var(--card-color, var(--text-3));
  opacity: 0.5; transition: opacity 0.2s;
}
.ag:hover::before { opacity: 1; }
.ag-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.ag-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.ag-role { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.ag-status { display: flex; align-items: center; gap: 4px; font-size: 10px; font-family: var(--mono); font-weight: 500; }
.ag-dot { width: 6px; height: 6px; border-radius: 50%; }
.ag-metrics { display: flex; gap: 2px; }
.ag-m { flex: 1; background: var(--surface-raised); border-radius: 6px; padding: 7px 8px; text-align: center; }
.ag-m-val { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
.ag-m-lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }

/* Overflow card */
.ag-more {
  background: var(--surface); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; min-height: 120px; color: var(--text);
}
.ag-more:hover { border-color: var(--accent); background: var(--surface-raised); }
.ag-more-count { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--text-2); }
.ag-more-label { font-size: 12px; color: var(--text-3); }
.ag-more-avatars { display: flex; margin-bottom: 2px; }
.ag-more-pip {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-family: var(--mono); font-weight: 600;
  border: 1.5px solid var(--bg); margin-left: -6px;
}
.ag-more-pip:first-child { margin-left: 0; }
.ag-more-names { display: flex; flex-direction: column; gap: 1px; margin: 2px 0; }
.ag-more-name { font-size: 11px; font-family: var(--mono); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; text-align: center; }

/* ── Panels ─────────────────────────────────────── */
.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column;
}
.panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 13px; font-weight: 600; }
.panel-body { flex: 1; overflow-y: auto; max-height: 280px; }

/* ── Feed Rows ──────────────────────────────────── */
.fr {
  display: flex; align-items: baseline; gap: 10px;
  padding: 9px 16px; font-size: 13px; color: var(--text-2);
  transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02);
}
.fr:last-child { border-bottom: none; }
.fr:hover { background: rgba(255,255,255,0.012); }
.fr-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; position: relative; top: 1px; }
.fr-time { font-family: var(--mono); font-size: 11px; color: var(--text-3); min-width: 36px; }
.fr-agent { color: var(--accent); font-weight: 500; }
.fr-dur { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-left: 3px; }

/* ── Consensus Rows ─────────────────────────────── */
.cr {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; font-size: 13px; color: var(--text-2);
  cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.cr:last-child { border-bottom: none; }
.cr:hover { background: rgba(255,255,255,0.012); }
.cr-time { font-family: var(--mono); font-size: 11px; color: var(--text-3); min-width: 36px; }
.cr-info { flex: 1; }
.cr-pills { display: flex; gap: 3px; }

/* ── Pills ──────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10.5px; font-family: var(--mono); font-weight: 600;
  padding: 3px 7px; border-radius: 5px;
}
.pill-g { background: var(--green-glow); color: var(--green); }
.pill-r { background: var(--red-glow); color: var(--red); }
.pill-y { background: var(--amber-glow); color: var(--amber); }

/* ── Signal Rows ────────────────────────────────── */
.sig-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; font-size: 12px; color: var(--text-2);
  transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02);
}
.sig-row:last-child { border-bottom: none; }
.sig-row:hover { background: rgba(255,255,255,0.012); }
.sig-type {
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  padding: 2px 7px; border-radius: 4px; min-width: 64px; text-align: center; flex-shrink: 0;
}
.sig-type.agreement { background: var(--green-glow); color: var(--green); }
.sig-type.hallucination { background: var(--red-glow); color: var(--red); }
.sig-type.unique { background: var(--blue-glow); color: var(--blue); }
.sig-type.disagreement { background: var(--amber-glow); color: var(--amber); }
.sig-agent { color: var(--accent); font-weight: 500; font-size: 12px; }
.sig-arrow { color: var(--text-3); font-size: 10px; }
.sig-finding { flex: 1; color: var(--text-2); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Knowledge ──────────────────────────────────── */
.know-agents { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; }
.ka {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; cursor: pointer; transition: all 0.15s;
  flex: 1; min-width: 200px;
}
.ka:hover { border-color: var(--border-active); background: var(--surface-hover); }
.ka-avatar {
  width: 24px; height: 24px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-family: var(--mono); font-weight: 600; flex-shrink: 0;
}
.ka-info { flex: 1; min-width: 0; }
.ka-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ka-stats { font-size: 10px; color: var(--text-3); font-family: var(--mono); }

.learn-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; font-size: 12px;
  transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer;
}
.learn-row:last-child { border-bottom: none; }
.learn-row:hover { background: rgba(255,255,255,0.012); }
.learn-avatar {
  width: 20px; height: 20px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-family: var(--mono); font-weight: 600; flex-shrink: 0;
}
.learn-text { flex: 1; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.learn-type { font-size: 9px; font-family: var(--mono); color: var(--text-3); flex-shrink: 0; }
.learn-when { font-size: 10px; font-family: var(--mono); color: var(--text-3); flex-shrink: 0; min-width: 32px; }

/* ── Memory Browser (detail view) ───────────────── */
.memory-md { padding: 1rem; font-size: 13px; line-height: 1.6; color: var(--text-2); }
.memory-md h1 { font-size: 1.125rem; color: var(--text); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h2 { font-size: 0.9375rem; color: var(--text); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h3 { font-size: 0.8125rem; color: var(--text); margin: 0.75rem 0 0.375rem; font-weight: 600; }
.memory-md ul { padding-left: 1.25rem; margin: 0.375rem 0; }
.memory-md li { margin: 0.25rem 0; }
.memory-md a { color: var(--accent); text-decoration: none; }
.memory-md a:hover { text-decoration: underline; }
.memory-md strong { color: var(--text); }
.memory-md code { background: rgba(255,255,255,0.06); padding: 0.125rem 0.375rem; border-radius: 3px; font-size: 0.8rem; font-family: var(--mono); }
.memory-md p { margin: 0.375rem 0; }
.memory-code { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.75rem; font-size: 0.75rem; font-family: var(--mono); overflow-x: auto; margin: 0.5rem 0; }
.memory-file { border-bottom: 1px solid rgba(255,255,255,0.04); padding: 0.25rem 0; }
.memory-file:last-child { border-bottom: none; }
.memory-file.cognitive { border-left: 2px solid var(--accent); padding-left: 0.75rem; }
.memory-file-header { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.375rem 0; font-size: 13px; }
.memory-file-header:hover { color: var(--accent); }
.memory-filename { font-family: var(--mono); color: var(--text); font-size: 0.75rem; }
.memory-desc { color: var(--text-3); font-size: 0.75rem; }
.memory-file-content {
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.75rem;
  font-size: 0.7rem; font-family: var(--mono); line-height: 1.5;
  overflow-x: auto; white-space: pre-wrap; color: var(--text-2);
  margin: 0.25rem 0 0.5rem;
}

/* ── Detail Views ───────────────────────────────── */
.detail-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-avatar {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-family: var(--mono); font-weight: 600;
}
.detail-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.detail-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }
.detail-stats { display: flex; gap: 10px; margin-bottom: 24px; }
.detail-stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; flex: 1; text-align: center;
}
.detail-stat-val { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.detail-stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* Filter buttons */
.filters { display: flex; gap: 4px; margin-bottom: 14px; }
.filter-btn {
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 12px; font-size: 12px; font-family: var(--mono); color: var(--text-3);
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: var(--text); border-color: var(--border-active); }
.filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(167,139,250,0.08); }

/* Search */
.search-input {
  width: 100%; padding: 8px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: var(--body);
  margin-bottom: 14px; outline: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-3); }

/* ── Layout Grids ───────────────────────────────── */
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.know-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Empty / Loading / Error States ─────────────── */
.empty-state { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }
.loading { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }

/* ── Animations ─────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.section:nth-child(1) { animation: fadeUp 0.35s ease-out; }
.section:nth-child(2) { animation: fadeUp 0.35s ease-out 0.04s both; }
.section:nth-child(3) { animation: fadeUp 0.35s ease-out 0.08s both; }
.section:nth-child(4) { animation: fadeUp 0.35s ease-out 0.12s both; }
.section:nth-child(5) { animation: fadeUp 0.35s ease-out 0.16s both; }

/* ── Responsive ─────────────────────────────────── */
@media (max-width: 1200px) {
  .page { padding: 20px 24px; }
}
@media (max-width: 1000px) {
  .agent-grid { grid-template-columns: repeat(2, 1fr); }
  .three-col { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 900px) {
  .two-col { grid-template-columns: 1fr; }
  .know-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .topbar { padding: 0 16px; }
  .page { padding: 16px; }
  .agent-grid { grid-template-columns: 1fr; }
  .three-col { grid-template-columns: 1fr; }
  .ag-metrics { flex-wrap: wrap; }
}

</style>
</head>
<body>
  <!-- Auth Gate -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h1>gossipcat</h1>
      <p class="auth-subtitle">Enter your dashboard key to continue</p>
      <form id="auth-form">
        <input type="password" id="auth-key" placeholder="Dashboard key" autocomplete="off" autofocus>

// packages/dashboard/src/app.js — Router, API, Auth, WebSocket, Hub orchestration

// ── Utilities ──────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function formatTokens(n) {
  if (n == null || n === 0) return '0';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (diff < 0) return 'just now';
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function agentInitials(id) {
  return id.split('-').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function agentColor(agent) {
  if (!agent || (!agent.online && agent.scores?.signals === 0)) return 'var(--text-3)';
  if (agent.provider === 'google') return 'var(--blue)';
  return 'var(--accent)';
}

// ── API Helper ─────────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch('/dashboard/api/' + path, { credentials: 'include' });
  if (res.status === 401) { showAuth(); throw new Error('Unauthorized'); }
  if (!res.ok) {
    const b = await res.json().catch(() => ({}));
    throw new Error(b.error || 'API error: ' + res.status);
  }
  return res.json();
}

// ── Auth ───────────────────────────────────────────────────────────────
const authGate = document.getElementById('auth-gate');
const dashboard = document.getElementById('dashboard');
const authForm = document.getElementById('auth-form');
const authError = document.getElementById('auth-error');

function showAuth() {
  authGate.hidden = false;
  dashboard.hidden = true;
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
}

function showDashboard() {
  authGate.hidden = true;
  dashboard.hidden = false;
  connectWs();
}

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = authForm.querySelector('button');
  btn.disabled = true;
  const key = document.getElementById('auth-key').value.trim();
  try {
    const res = await fetch('/dashboard/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key }),
      credentials: 'include',
    });
    if (!res.ok) { authError.hidden = false; return; }
    const verify = await fetch('/dashboard/api/overview', { credentials: 'include' });
    if (verify.ok) { authError.hidden = true; showDashboard(); route(); }
    else { authError.hidden = false; }
  } catch { authError.hidden = false; }
  finally { btn.disabled = false; }
});

// ── Router ─────────────────────────────────────────────────────────────
function getRoute() {
  const hash = location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  return { path: '/' + parts.join('/'), parts };
}

function navigate(path) { location.hash = path; }

let currentCleanup = null;

async function route() {
  // Clean up previous view's event listeners
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }

  const { path, parts } = getRoute();
  const app = document.getElementById('app');
  updateBreadcrumb(parts);

  // Hub
  if (path === '/' || path === '/overview') return renderHub(app);

  // Detail views
  if (path === '/team') return renderAllAgents(app);
  if (parts[0] === 'team' && parts[1]) return renderAgentDetail(app, decodeURIComponent(parts[1]));
  if (path === '/tasks') return renderTasksDetail(app);
  if (parts[0] === 'consensus' && parts[1]) return renderConsensusDetail(app, decodeURIComponent(parts[1]));
  if (path === '/signals') return renderSignalsDetail(app);
  if (parts[0] === 'knowledge' && parts[1]) return renderKnowledgeDetail(app, decodeURIComponent(parts[1]));

  app.innerHTML = '<div class="empty-state">Page not found</div>';
}

function updateBreadcrumb(parts) {
  const el = document.getElementById('breadcrumb-page');
  if (!el) return;
  if (parts.length === 0) { el.textContent = 'Overview'; return; }
  el.textContent = parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' / ');
}

window.addEventListener('hashchange', route);

// ── WebSocket ──────────────────────────────────────────────────────────
let ws = null;
const wsStatus = document.getElementById('ws-status');
const wsLabel = document.getElementById('ws-label');
const eventListeners = new Set();

function onDashboardEvent(fn) { eventListeners.add(fn); return fn; }
function offDashboardEvent(fn) { eventListeners.delete(fn); }

function connectWs() {
  if (ws) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/dashboard/ws');

  ws.onopen = () => {
    if (wsStatus) wsStatus.className = 'ws-dot online';
    if (wsLabel) wsLabel.textContent = 'Connected';
  };

  ws.onclose = () => {
    if (wsStatus) wsStatus.className = 'ws-dot offline';
    if (wsLabel) wsLabel.textContent = 'Disconnected';
    ws = null;
    if (!dashboard.hidden) setTimeout(connectWs, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      for (const fn of eventListeners) fn(event);
    } catch { /* ignore */ }
  };
}

// ── Hub Renderer ───────────────────────────────────────────────────────
async function renderHub(app) {
  app.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const [overview, agents, consensus] = await Promise.all([
      api('overview'), api('agents'), api('consensus'),
    ]);
    app.innerHTML = '';

    // Build sections
    app.appendChild(renderOverviewSection(overview));
    app.appendChild(renderTeamSection(agents));
    app.appendChild(renderActivitySection({tasks:[]}, consensus, {signals:[]}));
    app.appendChild(renderKnowledgeSection(agents));

    // Wire WS live updates — selective section refresh, debounced
    let refreshTimer = null;
    const pendingSections = new Set();

    const sectionMap = {
      task_dispatched:      ['activity'],
      task_completed:       ['overview', 'activity'],
      task_failed:          ['overview', 'activity'],
      consensus_started:    ['activity'],
      consensus_complete:   ['overview', 'activity'],
      agent_connected:      ['overview', 'team'],
      agent_disconnected:   ['overview', 'team'],
      skill_changed:        [],
    };

    const wsHandler = onDashboardEvent((event) => {
      const sections = sectionMap[event.type];
      if (!sections || sections.length === 0) return;
      for (const s of sections) pendingSections.add(s);

      // Debounce: wait 500ms to batch rapid events
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(async () => {
        const toRefresh = new Set(pendingSections);
        pendingSections.clear();

        try {
          // Only fetch APIs needed for the sections being refreshed
          const needsOverview = toRefresh.has('overview');
          const needsAgents = toRefresh.has('team') || toRefresh.has('knowledge');
          const needsConsensus = toRefresh.has('activity');

          const [ov, ag, cx] = await Promise.all([
            needsOverview ? api('overview') : null,
            needsAgents ? api('agents') : null,
            needsConsensus ? api('consensus') : null,
          ]);

          // Replace only the affected section DOM nodes
          // sections: [0]=overview, [1]=team, [2]=activity, [3]=knowledge
          const sections = app.querySelectorAll('.section');
          if (ov && sections[0]) { const el = renderOverviewSection(ov); sections[0].replaceWith(el); }
          if (ag && sections[1]) { const el = renderTeamSection(ag); sections[1].replaceWith(el); }
          if (cx && sections[2]) { const el = renderActivitySection({tasks:[]}, cx, {signals:[]}); sections[2].replaceWith(el); }
          if (ag && sections[3]) { const el = renderKnowledgeSection(ag); sections[3].replaceWith(el); }
        } catch { /* best-effort live update */ }
      }, 500);
    });
    currentCleanup = () => { offDashboardEvent(wsHandler); if (refreshTimer) clearTimeout(refreshTimer); };

  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load dashboard: ' + escapeHtml(err.message) + '</div>';
  }
}

// ── Section Helper ─────────────────────────────────────────────────────
function makeSection(title, count, actionText, actionTarget) {
  const section = document.createElement('div');
  section.className = 'section';

  const header = document.createElement('div');
  header.className = 'sh';
  header.innerHTML =
    '<div class="sh-left">' +
      '<span class="sh-title">' + escapeHtml(title) + '</span>' +
      (count != null ? '<span class="sh-count">' + escapeHtml(String(count)) + '</span>' : '') +
    '</div>' +
    (actionText ? '<button class="sh-action" role="link">' + escapeHtml(actionText) + '</button>' : '');

  if (actionTarget) {
    const btn = header.querySelector('.sh-action');
    if (btn) btn.addEventListener('click', () => navigate(actionTarget));
  }

  section.appendChild(header);
  return section;
}

// ── Init ───────────────────────────────────────────────────────────────
api('overview')
  .then(() => { showDashboard(); route(); })
  .catch(() => showAuth());

// Export for hub/detail modules
window._dash = { api, navigate, escapeHtml, formatTokens, timeAgo, agentInitials, agentColor, onDashboardEvent, offDashboardEvent, makeSection };

// packages/dashboard/src/lib/markdown.js — Simple markdown renderer (extracted from Phase 1)

function renderMarkdown(md) {
  const esc = window._dash.escapeHtml;

  // Extract code blocks BEFORE escaping
  const codeBlocks = [];
  let processed = md.replace(/```[\s\S]*?```/g, (m) => {
    const content = m.slice(3, -3).replace(/^[^\n]*\n/, '');
    const placeholder = '\x00CODE' + codeBlocks.length + '\x00';
    codeBlocks.push('<pre class="memory-code">' + esc(content) + '</pre>');
    return placeholder;
  });

  const inlineCodes = [];
  processed = processed.replace(/`([^`]+)`/g, (_, code) => {
    const placeholder = '\x00INLINE' + inlineCodes.length + '\x00';
    inlineCodes.push('<code>' + esc(code) + '</code>');
    return placeholder;
  });

  let html = esc(processed);

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links: safe schemes only, escape URL
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
    if (/^(https?:\/\/|knowledge\/|#)/.test(url)) return '<a href="' + esc(url) + '">' + text + '</a>';
    return text;
  });

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*(<(?:h[1-4]|ul|pre|li)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-4]|ul|pre|li)>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  // Restore placeholders
  codeBlocks.forEach((block, i) => { html = html.replace('\x00CODE' + i + '\x00', block); });
  inlineCodes.forEach((code, i) => { html = html.replace('\x00INLINE' + i + '\x00', code); });

  return html;
}

// packages/dashboard/src/hub/overview.js — Status bar (replaces metric cards)

function renderOverviewSection(data) {
  const { timeAgo } = window._dash;
  const section = document.createElement('div');
  section.className = 'section status-bar';

  const connected = data.relayConnected || 0;
  const native = data.nativeCount || 0;
  const totalOnline = connected + native;

  const lastRun = data.lastConsensusTimestamp;
  const lastRunText = lastRun ? timeAgo(lastRun) : 'never';

  const unverified = data.unverifiedFindings || 0;

  const dot = '<span class="sb-dot' + (totalOnline > 0 ? ' online' : '') + '"></span>';

  section.innerHTML =
    '<div class="sb-left">' +
      dot +
      '<span class="sb-stat">' + totalOnline + ' connected</span>' +
      '<span class="sb-sep">&middot;</span>' +
      '<span class="sb-stat">last run ' + lastRunText + '</span>' +
    '</div>' +
    '<div class="sb-right">' +
      (unverified > 0
        ? '<span class="sb-action">' + unverified + ' findings to review</span>'
        : '<span class="sb-clear">all clear</span>') +
    '</div>';

  return section;
}

// packages/dashboard/src/hub/team.js — Agent cards (3 + overflow)

function renderTeamSection(agents) {
  const { escapeHtml: e, navigate, formatTokens, agentInitials, agentColor, makeSection } = window._dash;
  const section = makeSection('Team', agents.length + ' agents', 'manage →', '#/team');

  if (agents.length === 0) {
    section.innerHTML += '<div class="empty-state">No agents configured. Run gossip_setup to create your team.</div>';
    return section;
  }

  const grid = document.createElement('div');
  grid.className = 'agent-grid';

  // Sort by dispatch weight descending, show top 3
  const sorted = [...agents].sort((a, b) => (b.scores?.dispatchWeight || 0) - (a.scores?.dispatchWeight || 0));
  const shown = sorted.slice(0, 3);
  const overflow = sorted.slice(3);

  for (const agent of shown) {
    const s = agent.scores || {};
    const isIdle = !agent.online && s.signals === 0;
    const color = agentColor(agent);

    const card = document.createElement('button');
    card.className = 'ag' + (isIdle ? ' idle' : '');
    card.style.setProperty('--card-color', color);
    card.setAttribute('role', 'link');
    card.setAttribute('aria-label', 'View ' + agent.id);
    card.addEventListener('click', () => navigate('#/team/' + encodeURIComponent(agent.id)));

    const statusColor = agent.online ? 'var(--green)' : 'var(--text-3)';
    const statusText = agent.online ? 'online' : 'idle';
    const dotStyle = agent.online ? 'background:var(--green);box-shadow:0 0 6px rgba(52,211,153,0.4)' : 'background:var(--text-3)';

    const provider = (agent.provider || '').replace(/^anthropic$/, 'Anthropic').replace(/^google$/, 'Google');
    const preset = (agent.preset || '').charAt(0).toUpperCase() + (agent.preset || '').slice(1);

    card.innerHTML =
      '<div class="ag-top"><div>' +
        '<div class="ag-name">' + e(agent.id) + '</div>' +
        '<div class="ag-role">' + e(provider) + ' &middot; ' + e(preset) + '</div>' +
      '</div>' +
      '<div class="ag-status" style="color:' + statusColor + '">' +
        '<span class="ag-dot" style="' + dotStyle + '"></span>' + statusText +
      '</div></div>' +
      '<div class="ag-metrics">' +
        '<div class="ag-m"><div class="ag-m-val" style="color:var(--accent)">' + (isIdle ? '&mdash;' : Math.round(s.accuracy * 100) + '%') + '</div><div class="ag-m-lbl">Accuracy</div></div>' +
        '<div class="ag-m"><div class="ag-m-val" style="color:var(--blue)">' + (isIdle ? '&mdash;' : Math.round(s.uniqueness * 100) + '%') + '</div><div class="ag-m-lbl">Unique</div></div>' +
        '<div class="ag-m"><div class="ag-m-val">' + (s.signals || 0) + '</div><div class="ag-m-lbl">Signals</div></div>' +
        '<div class="ag-m"><div class="ag-m-val" style="color:var(--green)">' + formatTokens(agent.totalTokens) + '</div><div class="ag-m-lbl">Tokens</div></div>' +
      '</div>';

    grid.appendChild(card);
  }

  // Overflow card
  if (overflow.length > 0) {
    const more = document.createElement('button');
    more.className = 'ag-more';
    more.setAttribute('role', 'link');
    more.setAttribute('aria-label', 'View all agents');
    more.addEventListener('click', () => navigate('#/team'));

    const avatars = overflow.slice(0, 4).map(a => {
      const c = agentColor(a);
      return '<div class="ag-more-pip" style="background:' + c.replace('var(--', 'rgba(').replace(')', ',0.12)') + ';color:' + c + '">' + agentInitials(a.id) + '</div>';
    }).join('');

    const names = overflow.map(a => {
      return '<div class="ag-more-name">' + e(a.id) + '</div>';
    }).join('');

    more.innerHTML =
      '<div class="ag-more-avatars">' + avatars + '</div>' +
      '<div class="ag-more-names">' + names + '</div>' +
      '<div class="ag-more-count">+' + overflow.length + '</div>' +
      '<div class="ag-more-label">more agents</div>';

    grid.appendChild(more);
  }

  section.appendChild(grid);
  return section;
}

// packages/dashboard/src/hub/activity.js — 3-column: tasks + consensus + signals

function renderActivitySection(tasksData, consensusData, signalsData) {
  const { escapeHtml: e, navigate, makeSection } = window._dash;
  const totalToday = tasksData.tasks?.length || 0;
  const section = makeSection('Activity', totalToday + ' tasks', 'all tasks →', '#/tasks');

  const cols = document.createElement('div');
  cols.className = 'three-col';

  // ── Recent Tasks panel ─────────────────────────
  const tasksPanel = document.createElement('div');
  tasksPanel.className = 'panel';
  tasksPanel.innerHTML = '<div class="panel-head"><span class="panel-title">Recent Tasks</span></div>';
  const tasksBody = document.createElement('div');
  tasksBody.className = 'panel-body';

  const tasks = (tasksData.tasks || []).slice(0, 20);
  if (tasks.length === 0) {
    tasksBody.innerHTML = '<div class="empty-state">No tasks yet</div>';
  } else {
    for (const t of tasks) {
      const time = t.timestamp ? new Date(t.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      const color = t.status === 'completed' ? 'var(--green)' : t.status === 'failed' ? 'var(--red)' : 'var(--accent)';
      const dur = t.duration > 0 ? '<span class="fr-dur">' + (t.duration / 1000).toFixed(1) + 's</span>' : '';
      const desc = e((t.task || '').replace(/\n.*/s, '').slice(0, 50));

      const row = document.createElement('div');
      row.className = 'fr';
      row.innerHTML =
        '<span class="fr-dot" style="background:' + color + '"></span>' +
        '<span class="fr-time">' + time + '</span>' +
        '<span><span class="fr-agent">' + e(t.agentId) + '</span> ' + desc + dur + '</span>';
      tasksBody.appendChild(row);
    }
  }
  tasksPanel.appendChild(tasksBody);
  cols.appendChild(tasksPanel);

  // ── Consensus Runs panel ───────────────────────
  const cxPanel = document.createElement('div');
  cxPanel.className = 'panel';
  cxPanel.innerHTML =
    '<div class="panel-head"><span class="panel-title">Consensus</span>' +
    '<button class="sh-action" role="link">details →</button></div>';
  cxPanel.querySelector('.sh-action')?.addEventListener('click', () => navigate('#/signals'));

  const cxBody = document.createElement('div');
  cxBody.className = 'panel-body';

  const runs = (consensusData.runs || []).slice(0, 10);
  if (runs.length === 0) {
    cxBody.innerHTML = '<div class="empty-state">No consensus runs yet</div>';
  } else {
    for (const run of runs) {
      const time = run.timestamp ? new Date(run.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      const c = run.counts || {};
      const pills = [];
      if (c.agreement) pills.push('<span class="pill pill-g">&#10003; ' + c.agreement + '</span>');
      if (c.disagreement || c.hallucination) pills.push('<span class="pill pill-r">' + ((c.disagreement || 0) + (c.hallucination || 0)) + '</span>');
      if (c.unverified) pills.push('<span class="pill pill-y">' + c.unverified + '</span>');

      const row = document.createElement('div');
      row.className = 'cr';
      row.addEventListener('click', () => navigate('#/consensus/' + encodeURIComponent(run.taskId)));
      row.innerHTML =
        '<span class="cr-time">' + time + '</span>' +
        '<span class="cr-info">' + run.agents.length + ' agents</span>' +
        '<div class="cr-pills">' + pills.join('') + '</div>';
      cxBody.appendChild(row);
    }
  }
  cxPanel.appendChild(cxBody);
  cols.appendChild(cxPanel);

  // ── Signals panel ──────────────────────────────
  const sigPanel = document.createElement('div');
  sigPanel.className = 'panel';
  sigPanel.innerHTML =
    '<div class="panel-head"><span class="panel-title">Signals</span>' +
    '<button class="sh-action" role="link">all →</button></div>';
  sigPanel.querySelector('.sh-action')?.addEventListener('click', () => navigate('#/signals'));

  const sigBody = document.createElement('div');
  sigBody.className = 'panel-body';

  const sigs = (signalsData.signals || []).slice(0, 15);
  if (sigs.length === 0) {
    sigBody.innerHTML = '<div class="empty-state">No signals yet</div>';
  } else {
    for (const s of sigs) {
      const typeClass = (s.signal || '').includes('agreement') ? 'agreement'
        : (s.signal || '').includes('hallucination') ? 'hallucination'
        : (s.signal || '').includes('unique') ? 'unique'
        : (s.signal || '').includes('disagree') ? 'disagreement' : 'unique';
      const typeLabel = (s.signal || '').replace(/_/g, ' ').replace(/caught$/, '').trim().slice(0, 10);
      const finding = e((s.evidence || s.finding || '').slice(0, 40));
      const arrow = s.counterpartId ? '<span class="sig-arrow">→</span><span class="sig-agent">' + e(s.counterpartId).slice(0, 12) + '</span>' : '';

      const row = document.createElement('div');
      row.className = 'sig-row';
      row.innerHTML =
        '<span class="sig-type ' + typeClass + '">' + e(typeLabel) + '</span>' +
        '<span class="sig-agent">' + e((s.agentId || '').slice(0, 12)) + '</span>' +
        arrow +
        '<span class="sig-finding">' + finding + '</span>';
      sigBody.appendChild(row);
    }
  }
  sigPanel.appendChild(sigBody);
  cols.appendChild(sigPanel);

  section.appendChild(cols);
  return section;
}

  projectChip.className = 'ka';
  projectChip.addEventListener('click', () => navigate('#/knowledge/_project'));
  projectChip.innerHTML =
    '<div class="ka-avatar" style="background:rgba(167,139,250,0.1);color:var(--accent)">P</div>' +
    '<div class="ka-info"><div class="ka-name">_project (shared)</div><div class="ka-stats">shared context</div></div>';
  chips.appendChild(projectChip);

  for (const agent of agents) {
    const color = agentColor(agent);
    const chip = document.createElement('button');
    chip.className = 'ka';
    if (!agent.online && (agent.scores?.signals || 0) === 0) chip.style.opacity = '0.6';
    chip.addEventListener('click', () => navigate('#/knowledge/' + encodeURIComponent(agent.id)));
    chip.innerHTML =
      '<div class="ka-avatar" style="background:' + color.replace('var(--', 'rgba(').replace(')', ',0.1)') + ';color:' + color + '">' + agentInitials(agent.id) + '</div>' +
      '<div class="ka-info"><div class="ka-name">' + e(agent.id) + '</div><div class="ka-stats">' + (agent.scores?.signals || 0) + ' signals</div></div>';
    chips.appendChild(chip);
  }

  memPanel.appendChild(chips);
  grid.appendChild(memPanel);

  // ── Right: Recent learnings ──────────────────────
  const learnPanel = document.createElement('div');
  learnPanel.className = 'panel';
  learnPanel.innerHTML = '<div class="panel-head"><span class="panel-title">Recent Learnings</span></div>';

  const learnBody = document.createElement('div');
  learnBody.className = 'panel-body';
  learnBody.innerHTML = '<div class="empty-state">Loading...</div>';
  learnPanel.appendChild(learnBody);
  grid.appendChild(learnPanel);

  // Fetch learnings async — don't block hub render
  window._dash.api('learnings').then(data => {
    const items = (data.learnings || []);
    if (items.length === 0) {
      learnBody.innerHTML = '<div class="empty-state">No learnings yet</div>';
      return;
    }
    learnBody.innerHTML = '';
    for (const item of items) {
      const color = agentColor(agents.find(a => a.id === item.agentId) || { provider: '', online: false, scores: {} });
      const row = document.createElement('div');
      row.className = 'learn-row';
      row.addEventListener('click', () => navigate('#/knowledge/' + encodeURIComponent(item.agentId)));
      row.innerHTML =
        '<div class="learn-avatar" style="background:' + color.replace('var(--', 'rgba(').replace(')', ',0.1)') + ';color:' + color + '">' + agentInitials(item.agentId) + '</div>' +
        '<span class="learn-text">' + e(item.description).slice(0, 60) + '</span>' +
        '<span class="learn-type">' + e(item.type) + '</span>';
      learnBody.appendChild(row);
    }
  }).catch(() => {
    learnBody.innerHTML = '<div class="empty-state">Failed to load learnings</div>';
  });

  section.appendChild(grid);
  return section;
}

// packages/dashboard/src/detail/agent.js — Agent detail view

async function renderAgentDetail(app, agentId) {
  const { api, escapeHtml: e, formatTokens, agentInitials, agentColor, navigate, makeSection } = window._dash;
  app.innerHTML = '<div class="loading">Loading agent...</div>';

  try {
    const [agents, memData] = await Promise.all([api('agents'), api('memory/' + encodeURIComponent(agentId))]);
    const agent = agents.find(a => a.id === agentId);
    if (!agent) { app.innerHTML = '<div class="empty-state">Agent not found: ' + e(agentId) + '</div>'; return; }

    const s = agent.scores || {};
    const color = agentColor(agent);
    app.innerHTML = '';

    // Header
    const header = document.createElement('div');
    header.className = 'detail-header';
    header.innerHTML =
      '<div class="detail-avatar" style="background:' + color.replace('var(--', 'rgba(').replace(')', ',0.12)') + ';color:' + color + '">' + agentInitials(agentId) + '</div>' +
      '<div><div class="detail-title">' + e(agentId) + '</div>' +
      '<div class="detail-subtitle">' + e(agent.provider || '') + ' &middot; ' + e(agent.model || '') + (agent.preset ? ' &middot; ' + e(agent.preset) : '') + '</div></div>';
    app.appendChild(header);

    // Stats
    const stats = document.createElement('div');
    stats.className = 'detail-stats';
    const metrics = [
      { label: 'Accuracy', value: Math.round(s.accuracy * 100) + '%', color: 'var(--accent)' },
      { label: 'Uniqueness', value: Math.round(s.uniqueness * 100) + '%', color: 'var(--blue)' },
      { label: 'Signals', value: String(s.signals || 0) },
      { label: 'Tokens', value: formatTokens(agent.totalTokens), color: 'var(--green)' },
      { label: 'Weight', value: (s.dispatchWeight || 1).toFixed(2) },
    ];
    for (const m of metrics) {
      const stat = document.createElement('div');
      stat.className = 'detail-stat';
      stat.innerHTML = '<div class="detail-stat-val"' + (m.color ? ' style="color:' + m.color + '"' : '') + '>' + m.value + '</div><div class="detail-stat-lbl">' + m.label + '</div>';
      stats.appendChild(stat);
    }
    app.appendChild(stats);

    // Memory section
    if (memData.knowledge && memData.knowledge.length > 0) {
      const memSection = makeSection('Knowledge', memData.fileCount + ' files');
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = '<div class="panel-head"><span class="panel-title">Knowledge Files</span></div>';
      const body = document.createElement('div');
      body.className = 'panel-body';
      for (const k of [...memData.knowledge].reverse().slice(0, 20)) {
        const isCognitive = (k.frontmatter && k.frontmatter.type === 'cognitive') || (k.content || '').includes('You reviewed');
        const desc = e((k.frontmatter && (k.frontmatter.description || k.frontmatter.name)) || k.filename);
        const row = document.createElement('div');
        row.className = 'memory-file' + (isCognitive ? ' cognitive' : '');
        row.innerHTML =
          '<div class="memory-file-header" onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden">' +
          '<span style="font-family:monospace;color:var(--text-3);width:1rem;text-align:center">+</span>' +
          '<span class="memory-filename">' + e(k.filename) + '</span>' +
          '<span class="memory-desc">' + desc + '</span></div>' +
          '<pre class="memory-file-content" hidden>' + e(k.content) + '</pre>';
        body.appendChild(row);
      }
      panel.appendChild(body);
      memSection.appendChild(panel);
      app.appendChild(memSection);
    }

  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load agent: ' + e(err.message) + '</div>';
  }
}

// packages/dashboard/src/detail/tasks.js — Full task list with filters + search + tokens

async function renderTasksDetail(app) {
  const { api, escapeHtml: e, formatTokens, makeSection } = window._dash;
  app.innerHTML = '<div class="loading">Loading tasks...</div>';

  try {
    const data = await api('tasks');
    app.innerHTML = '';

    const section = makeSection('Tasks', data.total + ' total');

    // Filters
    const filters = document.createElement('div');
    filters.className = 'filters';
    const statuses = ['all', 'completed', 'failed', 'running', 'cancelled'];
    let activeFilter = 'all';

    for (const s of statuses) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (s === 'all' ? ' active' : '');
      btn.textContent = s;
      btn.addEventListener('click', () => {
        activeFilter = s;
        filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderRows();
      });
      filters.appendChild(btn);
    }
    section.appendChild(filters);

    // Search
    const search = document.createElement('input');
    search.className = 'search-input';
    search.placeholder = 'Search by agent or task description...';
    search.addEventListener('input', renderRows);
    section.appendChild(search);

    // Table
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = '<div class="panel-body" style="max-height:500px"></div>';
    const body = panel.querySelector('.panel-body');
    section.appendChild(panel);

    function renderRows() {
      body.innerHTML = '';
      const q = search.value.toLowerCase();
      const filtered = (data.tasks || []).filter(t => {
        if (activeFilter !== 'all' && t.status !== activeFilter) return false;
        if (q && !t.agentId.toLowerCase().includes(q) && !(t.task || '').toLowerCase().includes(q)) return false;
        return true;
      });

      if (filtered.length === 0) {
        body.innerHTML = '<div class="empty-state">No matching tasks</div>';
        return;
      }

      for (const t of filtered) {
        const time = t.timestamp ? new Date(t.timestamp).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
        const color = t.status === 'completed' ? 'var(--green)' : t.status === 'failed' ? 'var(--red)' : t.status === 'cancelled' ? 'var(--amber)' : 'var(--accent)';
        const dur = t.duration > 0 ? (t.duration / 1000).toFixed(1) + 's' : '—';
        const tokens = (t.inputTokens || t.outputTokens) ? formatTokens((t.inputTokens || 0) + (t.outputTokens || 0)) : '—';
        const desc = e((t.task || '').replace(/\n.*/s, '').slice(0, 80));

        const row = document.createElement('div');
        row.className = 'fr';
        row.innerHTML =
          '<span class="fr-dot" style="background:' + color + '"></span>' +
          '<span class="fr-time" style="min-width:80px">' + time + '</span>' +
          '<span class="fr-agent" style="min-width:120px">' + e(t.agentId) + '</span>' +
          '<span style="color:var(--text-2);flex:1">' + desc + '</span>' +
          '<span class="fr-dur" style="min-width:45px">' + dur + '</span>' +
          '<span class="fr-dur" style="min-width:45px">' + tokens + '</span>';
        body.appendChild(row);
      }
    }

    renderRows();
    app.appendChild(section);
  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load tasks: ' + e(err.message) + '</div>';
  }
}

// packages/dashboard/src/detail/consensus.js — Single consensus run detail

async function renderConsensusDetail(app, taskId) {
  const { api, escapeHtml: e, makeSection } = window._dash;
  app.innerHTML = '<div class="loading">Loading consensus run...</div>';

  try {
    const data = await api('consensus');
    const run = (data.runs || []).find(r => r.taskId === taskId);
    if (!run) { app.innerHTML = '<div class="empty-state">Consensus run not found: ' + e(taskId) + '</div>'; return; }

    app.innerHTML = '';
    const section = makeSection('Consensus Run', run.agents.length + ' agents');

    // Run info
    const info = document.createElement('div');
    info.className = 'detail-stats';
    const c = run.counts || {};
    const statItems = [
      { label: 'Agreements', value: c.agreement || 0, color: 'var(--green)' },
      { label: 'Disagreements', value: c.disagreement || 0, color: 'var(--red)' },
      { label: 'Hallucinations', value: c.hallucination || 0, color: 'var(--red)' },
      { label: 'Unverified', value: c.unverified || 0, color: 'var(--amber)' },
      { label: 'Unique', value: c.unique || 0, color: 'var(--blue)' },
    ];
    for (const s of statItems) {
      const stat = document.createElement('div');
      stat.className = 'detail-stat';
      stat.innerHTML = '<div class="detail-stat-val" style="color:' + s.color + '">' + s.value + '</div><div class="detail-stat-lbl">' + s.label + '</div>';
      info.appendChild(stat);
    }
    section.appendChild(info);

    // Signals list
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = '<div class="panel-head"><span class="panel-title">Signals</span></div>';
    const body = document.createElement('div');
    body.className = 'panel-body';
    body.style.maxHeight = '500px';

    for (const s of (run.signals || [])) {
      const typeClass = (s.signal || '').includes('agreement') ? 'agreement'
        : (s.signal || '').includes('hallucination') ? 'hallucination'
        : (s.signal || '').includes('unique') ? 'unique'
        : (s.signal || '').includes('disagree') ? 'disagreement' : 'unique';
      const typeLabel = (s.signal || '').replace(/_/g, ' ').replace(/caught$/, '').trim();
      const arrow = s.counterpartId ? '<span class="sig-arrow">→</span><span class="sig-agent">' + e(s.counterpartId) + '</span>' : '';
      const evidence = s.evidence ? '<div style="color:var(--text-3);font-size:11px;margin-top:4px;padding-left:72px">' + e(s.evidence.slice(0, 200)) + '</div>' : '';

      const row = document.createElement('div');
      row.className = 'sig-row';
      row.style.flexWrap = 'wrap';
      row.innerHTML =
        '<span class="sig-type ' + typeClass + '">' + e(typeLabel) + '</span>' +
        '<span class="sig-agent">' + e(s.agentId || '') + '</span>' +
        arrow + evidence;
      body.appendChild(row);
    }

    panel.appendChild(body);
    section.appendChild(panel);
    app.appendChild(section);
  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load consensus: ' + e(err.message) + '</div>';
  }
}

// packages/dashboard/src/detail/signals.js — Full signal feed with type/agent filters

async function renderSignalsDetail(app) {
  const { api, escapeHtml: e, makeSection } = window._dash;
  app.innerHTML = '<div class="loading">Loading signals...</div>';

  try {
    const data = await api('signals');
    app.innerHTML = '';

    const section = makeSection('Signals', data.total + ' total');

    // Type filters
    const filters = document.createElement('div');
    filters.className = 'filters';
    const types = ['all', 'agreement', 'disagreement', 'unique', 'hallucination'];
    let activeType = 'all';

    for (const t of types) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (t === 'all' ? ' active' : '');
      btn.textContent = t === 'hallucination' ? 'halluc.' : t;
      btn.addEventListener('click', () => {
        activeType = t;
        filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderRows();
      });
      filters.appendChild(btn);
    }
    section.appendChild(filters);

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = '<div class="panel-body" style="max-height:600px"></div>';
    const body = panel.querySelector('.panel-body');
    section.appendChild(panel);

    function renderRows() {
      body.innerHTML = '';
      const filtered = (data.signals || []).filter(s => {
        if (activeType === 'all') return true;
        return (s.signal || '').includes(activeType);
      });

      if (filtered.length === 0) {
        body.innerHTML = '<div class="empty-state">No matching signals</div>';
        return;
      }

      for (const s of filtered) {
        const typeClass = (s.signal || '').includes('agreement') ? 'agreement'
          : (s.signal || '').includes('hallucination') ? 'hallucination'
          : (s.signal || '').includes('unique') ? 'unique'
          : (s.signal || '').includes('disagree') ? 'disagreement' : 'unique';
        const typeLabel = (s.signal || '').replace(/_/g, ' ').replace(/caught$/, '').trim();
        const finding = e((s.evidence || s.finding || '').slice(0, 120));
        const arrow = s.counterpartId ? '<span class="sig-arrow">→</span><span class="sig-agent">' + e(s.counterpartId) + '</span>' : '';
        const time = s.timestamp ? new Date(s.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

        const row = document.createElement('div');
        row.className = 'sig-row';
        row.innerHTML =
          '<span class="fr-time">' + time + '</span>' +
          '<span class="sig-type ' + typeClass + '">' + e(typeLabel) + '</span>' +
          '<span class="sig-agent">' + e(s.agentId || '') + '</span>' +
          arrow +
          '<span class="sig-finding">' + finding + '</span>';
        body.appendChild(row);
      }
    }

    renderRows();
    app.appendChild(section);
  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load signals: ' + e(err.message) + '</div>';
  }
}

// packages/dashboard/src/detail/knowledge.js — Memory browser with markdown rendering

async function renderKnowledgeDetail(app, agentId) {
  const { api, escapeHtml: e, agentInitials, agentColor, makeSection } = window._dash;
  app.innerHTML = '<div class="loading">Loading memory...</div>';

  try {
    const data = await api('memory/' + encodeURIComponent(agentId));
    app.innerHTML = '';

    const section = makeSection(agentId + ' Memory', (data.fileCount || data.knowledge?.length || 0) + ' files');

    // MEMORY.md index
    if (data.index) {
      const indexPanel = document.createElement('div');
      indexPanel.className = 'panel';
      indexPanel.innerHTML =
        '<div class="panel-head"><span class="panel-title">MEMORY.md</span></div>' +
        '<div class="panel-body"><div class="memory-md">' + renderMarkdown(data.index) + '</div></div>';
      section.appendChild(indexPanel);
    }

    // Knowledge files
    if (data.knowledge && data.knowledge.length > 0) {
      const filesPanel = document.createElement('div');
      filesPanel.className = 'panel';
      filesPanel.style.marginTop = '10px';
      filesPanel.innerHTML =
        '<div class="panel-head"><span class="panel-title">Knowledge Files (' + data.knowledge.length + ')</span></div>';

      const filesBody = document.createElement('div');
      filesBody.className = 'panel-body';
      filesBody.style.maxHeight = '500px';

      const knowledgeSorted = [...data.knowledge].reverse();
      for (const k of knowledgeSorted) {
        const isCognitive = (k.frontmatter && k.frontmatter.type === 'cognitive') || (k.content || '').includes('You reviewed') || (k.content || '').includes('## What I Learned');
        const desc = e((k.frontmatter && (k.frontmatter.description || k.frontmatter.name)) || k.filename);

        const file = document.createElement('div');
        file.className = 'memory-file' + (isCognitive ? ' cognitive' : '');
        file.innerHTML =
          '<div class="memory-file-header" onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden">' +
          '<span style="font-family:var(--mono);color:var(--text-3);width:1rem;text-align:center">+</span>' +
          '<span class="memory-filename">' + e(k.filename) + '</span>' +
          '<span class="memory-desc">' + desc + '</span>' +
          (isCognitive ? '<span style="font-size:9px;font-family:var(--mono);color:var(--accent);margin-left:auto">cognitive</span>' : '') +
          '</div>' +
          '<pre class="memory-file-content" hidden>' + e(k.content) + '</pre>';
        filesBody.appendChild(file);
      }

      filesPanel.appendChild(filesBody);
      section.appendChild(filesPanel);
    }

    // Task history
    if (data.tasks && data.tasks.length > 0) {
      const taskPanel = document.createElement('div');
      taskPanel.className = 'panel';
      taskPanel.style.marginTop = '10px';
      taskPanel.innerHTML =
        '<div class="panel-head"><span class="panel-title">Task History (' + data.tasks.length + ')</span></div>';

      const taskBody = document.createElement('div');
      taskBody.className = 'panel-body';
      taskBody.style.maxHeight = '300px';

      for (const t of data.tasks.slice(-50).reverse()) {
        const row = document.createElement('div');
        row.className = 'fr';
        row.innerHTML =
          '<span class="fr-time" style="min-width:70px">' + (t.timestamp ? new Date(t.timestamp).toLocaleDateString() : '—') + '</span>' +
          '<span style="color:var(--text-2);flex:1">' + e(String(t.task || t.result || '—').slice(0, 120)) + '</span>';
        taskBody.appendChild(row);
      }

      taskPanel.appendChild(taskBody);
      section.appendChild(taskPanel);
    }

    if (!data.index && (!data.knowledge || data.knowledge.length === 0)) {
      section.innerHTML += '<div class="empty-state">No memory data for this agent.</div>';
    }

    app.appendChild(section);
  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load memory: ' + e(err.message) + '</div>';
  }
}

// All agents view (team detail)
async function renderAllAgents(app) {
  const { api, escapeHtml: e, navigate, formatTokens, agentInitials, agentColor, makeSection } = window._dash;
  app.innerHTML = '<div class="loading">Loading agents...</div>';

  try {
    const agents = await api('agents');
    app.innerHTML = '';
    const section = makeSection('All Agents', agents.length + ' total');

    if (agents.length === 0) {
      section.innerHTML += '<div class="empty-state">No agents configured.</div>';
      app.appendChild(section);
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'agent-grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(260px, 1fr))';

    const sorted = [...agents].sort((a, b) => (b.scores?.dispatchWeight || 0) - (a.scores?.dispatchWeight || 0));
    for (const agent of sorted) {
      const s = agent.scores || {};
      const isIdle = !agent.online && s.signals === 0;
      const color = agentColor(agent);

      const card = document.createElement('button');
      card.className = 'ag' + (isIdle ? ' idle' : '');
      card.style.setProperty('--card-color', color);
      card.addEventListener('click', () => navigate('#/team/' + encodeURIComponent(agent.id)));

      const statusColor = agent.online ? 'var(--green)' : 'var(--text-3)';
      const statusText = agent.online ? 'online' : 'idle';
      const dotStyle = agent.online ? 'background:var(--green);box-shadow:0 0 6px rgba(52,211,153,0.4)' : 'background:var(--text-3)';
      const provider = (agent.provider || '').replace(/^anthropic$/, 'Anthropic').replace(/^google$/, 'Google');
      const preset = (agent.preset || '').charAt(0).toUpperCase() + (agent.preset || '').slice(1);

      card.innerHTML =
        '<div class="ag-top"><div>' +
          '<div class="ag-name">' + e(agent.id) + '</div>' +
          '<div class="ag-role">' + e(provider) + ' &middot; ' + e(preset) + '</div>' +
        '</div><div class="ag-status" style="color:' + statusColor + '">' +
          '<span class="ag-dot" style="' + dotStyle + '"></span>' + statusText +
        '</div></div>' +
        '<div class="ag-metrics">' +
          '<div class="ag-m"><div class="ag-m-val" style="color:var(--accent)">' + (isIdle ? '&mdash;' : Math.round(s.accuracy * 100) + '%') + '</div><div class="ag-m-lbl">Accuracy</div></div>' +
          '<div class="ag-m"><div class="ag-m-val" style="color:var(--blue)">' + (isIdle ? '&mdash;' : Math.round(s.uniqueness * 100) + '%') + '</div><div class="ag-m-lbl">Unique</div></div>' +
          '<div class="ag-m"><div class="ag-m-val">' + (s.signals || 0) + '</div><div class="ag-m-lbl">Signals</div></div>' +
          '<div class="ag-m"><div class="ag-m-val" style="color:var(--green)">' + formatTokens(agent.totalTokens) + '</div><div class="ag-m-lbl">Tokens</div></div>' +
        '</div>';

      grid.appendChild(card);
    }

    section.appendChild(grid);
    app.appendChild(section);
  } catch (err) {
    app.innerHTML = '<div class="empty-state">Failed to load agents: ' + e(err.message) + '</div>';
  }
}
