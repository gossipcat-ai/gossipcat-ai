<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gossipcat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/assets/style.css">
</head>
<body>
  <!-- Auth Gate -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <img src="/dashboard/assets/gossipcat.png" alt="gossipcat" class="auth-logo">
      <p class="auth-subtitle">Authenticate to access the dashboard</p>
      <form id="auth-form">
        <input type="password" id="auth-key" placeholder="Dashboard key" autocomplete="off" autofocus>
        <button type="submit">Unlock</button>
      </form>
      <p id="auth-error" class="auth-error" hidden>Invalid key. Check your terminal for the correct key.</p>
    </div>
  </div>

  <!-- Dashboard (hidden until authenticated) -->
  <div id="dashboard" class="dashboard" hidden>
    <nav class="topbar" role="navigation">
      <div class="nav-left">
        <a href="#/" class="logo"><img src="/dashboard/assets/gossipcat.png" alt="gossipcat" class="logo-img">gossipcat</a>
        <span class="sep">/</span>
        <span id="breadcrumb-page" class="crumb">Overview</span>
      </div>
      <div class="nav-right">
        <div class="ws-badge" role="status" aria-label="WebSocket connection status">
          <span id="ws-status" class="ws-dot offline"></span>
          <span id="ws-label">Disconnected</span>
        </div>
      </div>
    </nav>

    <main id="app" class="page" role="main"></main>
  </div>

  <script src="/dashboard/assets/app.js"></script>
</body>
</html>
